# setup_primary.yml
# Cấu hình Data Guard - PRIMARY
# Theo hướng dẫn: Step 1 + Step 2 + Step 4
#
# Chạy trên Primary (192.168.1.195):
#   ansible-playbook setup_primary.yml
#
# Sau khi xong → chạy setup_standby.yml trên 192.168.1.196
# Sau khi standby xong → chạy lại: ansible-playbook setup_primary.yml --tags broker
---
- name: Setup Oracle Data Guard - Primary
  hosts: localhost
  connection: local
  become: yes
  vars:
    oracle_home: /u01/app/oracle/product/21c/dbhome_1
    oracle_base: /u01/app/oracle
    oracle_sid: ORCL
    oracle_unique_name: ORCL
    standby_unique_name: ORCL_STBY
    primary_ip: 192.168.1.195
    standby_ip: 192.168.1.196
    listener_port: 1521
    fra_dest: /u01/app/oracle/fast_recovery_area
    fra_size: 20G
    sys_password: "Oracle_4U"

  tasks:

    # ==========================================
    # SSH KEY SETUP
    # ==========================================
    - name: "SSH: Ensure .ssh directory"
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'
      tags: [always]

    - name: "SSH: Generate SSH key (nếu chưa có)"
      shell: ssh-keygen -t rsa -b 4096 -N "" -f /root/.ssh/id_rsa
      args:
        creates: /root/.ssh/id_rsa
      tags: [always]

    - name: "SSH: Copy SSH key sang Standby (hỏi password 1 lần)"
      shell: |
        ssh-copy-id -o StrictHostKeyChecking=no root@{{ standby_ip }}
        touch /root/.ssh/.ssh_copy_done_{{ standby_ip }}
      args:
        creates: /root/.ssh/.ssh_copy_done_{{ standby_ip }}
      tags: [always]

    - name: "SSH: Verify"
      shell: ssh -o StrictHostKeyChecking=no -o BatchMode=yes root@{{ standby_ip }} "echo OK"
      changed_when: false
      tags: [always]

    # ==========================================
    # STEP 1: Prepare Primary Database
    # ==========================================
    - name: "STEP1: Enable Archivelog Mode"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF
        SELECT LOG_MODE FROM V$DATABASE;
        EOF
      register: log_mode
      changed_when: false
      tags: [prepare]

    - name: "STEP1: Switch to ARCHIVELOG (nếu chưa)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SHUTDOWN IMMEDIATE;
        STARTUP MOUNT;
        ALTER DATABASE ARCHIVELOG;
        ALTER DATABASE OPEN;
        ALTER PLUGGABLE DATABASE ALL OPEN;
        EOF
      when: "'NOARCHIVELOG' in log_mode.stdout"
      tags: [prepare]

    - name: "STEP1: Enable Force Logging"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER DATABASE FORCE LOGGING;
        ALTER SYSTEM SWITCH LOGFILE;
        ALTER DATABASE FLASHBACK ON;
        EOF
      failed_when: false
      tags: [prepare]

    - name: "STEP1: Create Standby Redo Logs"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF
        SELECT COUNT(*) FROM V$LOGFILE WHERE TYPE='STANDBY';
        EOF
      register: srl_count
      changed_when: false
      tags: [prepare]

    - name: "STEP1: Add Standby Redo Logs (nếu chưa có)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 10 SIZE 50M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 11 SIZE 50M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 12 SIZE 50M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 13 SIZE 50M;
        ALTER SYSTEM SET STANDBY_FILE_MANAGEMENT=AUTO;
        EOF
      when: "'0' in srl_count.stdout"
      tags: [prepare]

    # ==========================================
    # STEP 2: Configure Network
    # ==========================================
    - name: "STEP2: Configure tnsnames.ora"
      copy:
        dest: "{{ oracle_home }}/network/admin/tnsnames.ora"
        owner: oracle
        group: oinstall
        content: |
          {{ oracle_unique_name }} =
            (DESCRIPTION =
              (ADDRESS_LIST =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ primary_ip }})(PORT = {{ listener_port }}))
              )
              (CONNECT_DATA = (SID = {{ oracle_sid }})))

          {{ standby_unique_name }} =
            (DESCRIPTION =
              (ADDRESS_LIST =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ standby_ip }})(PORT = {{ listener_port }}))
              )
              (CONNECT_DATA = (SID = {{ oracle_sid }})))
      tags: [network]

    - name: "STEP2: Configure listener.ora"
      copy:
        dest: "{{ oracle_home }}/network/admin/listener.ora"
        owner: oracle
        group: oinstall
        content: |
          LISTENER =
            (DESCRIPTION_LIST =
              (DESCRIPTION =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ primary_ip }})(PORT = {{ listener_port }}))
              )
            )
          SID_LIST_LISTENER =
            (SID_LIST =
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_sid }})
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
            )
      register: listener_changed
      tags: [network]

    - name: "STEP2: Reload listener"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} PATH={{ oracle_home }}/bin:$PATH
        lsnrctl reload
      when: listener_changed.changed
      tags: [network]

    # ==========================================
    # Copy Password File sang Standby
    # ==========================================
    - name: "PWD: Copy password file sang Standby"
      shell: |
        scp -o StrictHostKeyChecking=no \
          {{ oracle_base }}/dbs/orapw{{ oracle_sid }} \
          root@{{ standby_ip }}:{{ oracle_base }}/dbs/orapw{{ oracle_sid }}
        ssh -o StrictHostKeyChecking=no root@{{ standby_ip }} \
          "chown oracle:oinstall {{ oracle_base }}/dbs/orapw{{ oracle_sid }}"
      tags: [pwdfile]

    # ==========================================
    # STEP 4: Enable Data Guard Broker
    # ==========================================
    - name: "STEP4: Enable DG Broker trên Primary"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER SYSTEM SET DG_BROKER_START=TRUE;
        EOF
      tags: [broker]

    # ==========================================
    # STEP 5: Configure DG Broker
    # Chỉ chạy sau khi setup_standby.yml xong
    # ==========================================
    - name: "STEP5: Check Broker config tồn tại chưa"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        SHOW CONFIGURATION;
        EXIT;
        EOF
      register: broker_check
      failed_when: false
      changed_when: false
      tags: [broker]

    - name: "STEP5: Create Broker Configuration"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        CREATE CONFIGURATION 'DG_{{ oracle_sid }}' AS
          PRIMARY DATABASE IS '{{ oracle_unique_name }}'
          CONNECT IDENTIFIER IS '{{ oracle_unique_name }}';
        EXIT;
        EOF
      when: "'ORA-16532' in broker_check.stdout"
      tags: [broker]

    - name: "STEP5: Check Standby đã ADD chưa"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        SHOW DATABASE '{{ standby_unique_name }}';
        EXIT;
        EOF
      register: stby_check
      failed_when: false
      changed_when: false
      tags: [broker]

    - name: "STEP5: ADD DATABASE + ENABLE CONFIGURATION"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        ADD DATABASE '{{ standby_unique_name }}'
          AS CONNECT IDENTIFIER IS '{{ standby_unique_name }}'
          MAINTAINED AS PHYSICAL;
        ENABLE CONFIGURATION;
        EXIT;
        EOF
      when: >
        'was not found' in stby_check.stdout or
        'ORA-16532' in stby_check.stdout
      tags: [broker]

    - name: "STEP5: Wait for Broker"
      pause:
        seconds: 20
      tags: [broker]

    - name: "STEP5: SHOW CONFIGURATION"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        SHOW CONFIGURATION;
        SHOW DATABASE VERBOSE '{{ oracle_unique_name }}';
        SHOW DATABASE VERBOSE '{{ standby_unique_name }}';
        EXIT;
        EOF
      register: dg_status
      changed_when: false
      tags: [broker, validate]

    - name: "STEP5: Show DG Status"
      debug:
        msg: "{{ dg_status.stdout_lines }}"
      tags: [broker, validate]

    - name: "Summary"
      debug:
        msg:
          - "====================================="
          - "PRIMARY SETUP HOÀN TẤT"
          - "====================================="
          - "Workflow:"
          - "  1. setup_primary.yml       ← xong"
          - "  2. setup_standby.yml trên 196"
          - "  3. setup_primary.yml --tags broker"
          - "====================================="
      tags: [always]
