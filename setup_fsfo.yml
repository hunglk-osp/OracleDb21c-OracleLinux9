# setup_fsfo.yml
# Enable Fast-Start Failover (FSFO) cho Oracle Data Guard
#
# Yêu cầu: setup_primary.yml + setup_standby.yml đã chạy xong
#          SHOW CONFIGURATION phải là SUCCESS (không phải WARNING)
#
# Chạy trên Primary:
#   ansible-playbook -i inventory.ini setup_fsfo.yml
#
# Workflow:
#   1. Check Broker status
#   2. Enable Flashback Database trên cả Primary và Standby
#   3. Cấu hình FSFO properties
#   4. Enable FastStartFailover
#   5. Start 2 Observer (HA): obs_standby trên 196, obs_primary trên 195
#
# Observer HA (theo Oracle MAA best practice):
#   - 2 observer trên 2 server khác nhau
#   - Server nào chết → observer còn lại vẫn giám sát
#   - Không cần máy thứ 3
#
# Sau FSFO xảy ra:
#   - ansible-playbook -i inventory.ini setup_fsfo.yml --tags reinstate
---
- name: Enable Fast-Start Failover
  hosts: primary
  become: yes
  vars:
    oracle_home: /u01/app/oracle/product/21c/dbhome_1
    oracle_base: /u01/app/oracle
    oracle_sid: ORCL
    oracle_unique_name: ORCL
    standby_unique_name: ORCL_STBY
    primary_ip: 192.168.1.195
    standby_ip: 192.168.1.196
    listener_port: 1521
    sys_password: "Oracle_4U"
    # Primary down bao lâu thì trigger failover (giây)
    # Lab: 15-30s, Production: 30-60s
    fsfo_threshold: 30
    # Max data loss cho phép (giây). 0 = không giới hạn (MaxPerformance mode)
    fsfo_lag_limit: 0

  tasks:

    # ==========================================
    # STEP 1: Kiểm tra Broker status
    # ==========================================
    - name: "CHECK: Show Broker Configuration"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        SHOW CONFIGURATION;
        EOF
      register: broker_status
      failed_when: false
      changed_when: false
      tags: [always, check]

    - name: "CHECK: Display Broker status"
      debug:
        msg: "{{ broker_status.stdout_lines }}"
      tags: [always, check]

    - name: "CHECK: Assert Broker is accessible"
      assert:
        that: broker_status.rc == 0
        fail_msg: |
          Broker không accessible! Kiểm tra:
          1. DG_BROKER_START=TRUE trên cả Primary và Standby
          2. tnsnames.ora đúng
          3. Chạy setup_primary.yml --tags broker trước
      tags: [always]

    # ==========================================
    # STEP 2: Enable Flashback Database (bắt buộc cho FSFO)
    # Flashback cho phép reinstate old primary sau failover
    # ==========================================
    - name: "FLASH: Check Flashback trên Primary"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF
        SELECT FLASHBACK_ON FROM V$DATABASE;
        EXIT;
        EOF
      register: flash_primary
      changed_when: false
      tags: [flashback]

    - name: "FLASH: Enable Flashback trên Primary (nếu chưa)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER DATABASE FLASHBACK ON;
        EXIT;
        EOF
      when: "'YES' not in flash_primary.stdout"
      tags: [flashback]

    - name: "FLASH: Check Flashback trên Standby"
      shell: |
        ssh -o StrictHostKeyChecking=no root@{{ standby_ip }} "
          su - oracle -c '
            export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:\$PATH
            sqlplus -s / as sysdba << SQEOF
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF
        SELECT FLASHBACK_ON FROM V\\\$DATABASE;
        EXIT;
        SQEOF'
        "
      register: flash_standby
      failed_when: false
      changed_when: false
      tags: [flashback]

    - name: "FLASH: Enable Flashback trên Standby"
      shell: |
        ssh -o StrictHostKeyChecking=no root@{{ standby_ip }} "
          su - oracle -c '
            export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:\$PATH
            sqlplus -s / as sysdba << SQEOF
        ALTER DATABASE RECOVER MANAGED STANDBY DATABASE CANCEL;
        ALTER DATABASE FLASHBACK ON;
        ALTER DATABASE RECOVER MANAGED STANDBY DATABASE USING CURRENT LOGFILE DISCONNECT FROM SESSION;
        EXIT;
        SQEOF'
        "
      when: flash_standby.stdout is defined and 'YES' not in flash_standby.stdout
      failed_when: false
      tags: [flashback]

    # ==========================================
    # STEP 3: Cấu hình FSFO properties
    # ==========================================
    - name: "FSFO: Set FastStartFailoverThreshold = {{ fsfo_threshold }}s"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        EDIT CONFIGURATION SET PROPERTY FastStartFailoverThreshold = {{ fsfo_threshold }};
        EOF
      tags: [configure]

    - name: "FSFO: Set FastStartFailoverLagLimit = {{ fsfo_lag_limit }}"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        EDIT CONFIGURATION SET PROPERTY FastStartFailoverLagLimit = {{ fsfo_lag_limit }};
        EOF
      tags: [configure]

    - name: "FSFO: Set FastStartFailoverAutoReinstate = TRUE"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        EDIT CONFIGURATION SET PROPERTY FastStartFailoverAutoReinstate = TRUE;
        EOF
      tags: [configure]

    # ==========================================
    # STEP 4: Enable FastStartFailover
    # ==========================================
    - name: "FSFO: Enable FastStartFailover"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        ENABLE FAST_START FAILOVER;
        EOF
      register: fsfo_enable
      failed_when: false
      tags: [enable]

    - name: "FSFO: Show enable result"
      debug:
        msg: "{{ fsfo_enable.stdout_lines }}"
      tags: [enable]

    # ==========================================
    # STEP 5: Start Observer trên máy thứ 3 (192.168.1.18)
    #
    # Observer nằm độc lập — không trên Primary, không trên Standby
    # Khi Primary chết → Observer thấy → hỏi Standby xác nhận → trigger failover
    # ==========================================
    - name: "OBSERVER: Stop observer cũ trong broker"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        printf "STOP OBSERVER observer\nEXIT\n" | \
          dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} 2>&1 || true
      failed_when: false
      tags: [observer]

    - name: "OBSERVER: Kill observer process cũ trên máy thứ 3"
      shell: pkill -f "dgmgrl" || true
      delegate_to: observerdb
      failed_when: false
      tags: [observer]

    - name: "OBSERVER: Wait for process to die"
      pause:
        seconds: 3
      tags: [observer]

    - name: "OBSERVER: Create log directory trên máy thứ 3"
      file:
        path: /home/hunglk/oracle-observer
        state: directory
        mode: '0755'
      delegate_to: observerdb
      tags: [observer]

    - name: "OBSERVER: Install Oracle Instant Client (nếu chưa có)"
      shell: |
        which dgmgrl 2>/dev/null || \
        find /opt /usr/local /home -name dgmgrl 2>/dev/null | head -1 || \
        echo "NOT_FOUND"
      delegate_to: observerdb
      register: dgmgrl_path
      changed_when: false
      tags: [observer]

    - name: "OBSERVER: Show dgmgrl path"
      debug:
        msg: "dgmgrl location: {{ dgmgrl_path.stdout }}"
      tags: [observer]

    - name: "OBSERVER: Start observer trên máy thứ 3 (192.168.1.18)"
      shell: |
        DGMGRL_BIN="{{ dgmgrl_path.stdout }}"
        if [ "$DGMGRL_BIN" = "NOT_FOUND" ]; then
          echo "ERROR: dgmgrl not found on observer machine"
          exit 1
        fi
        mkdir -p /home/hunglk/oracle-observer
        (echo "START OBSERVER observer"; tail -f /dev/null) | \
          nohup $DGMGRL_BIN -silent sys/{{ sys_password }}@{{ oracle_unique_name }} \
          > /home/hunglk/oracle-observer/observer.log 2>&1 &
        echo "Observer PID: $!"
      delegate_to: observerdb
      async: 10
      poll: 0
      tags: [observer]

    - name: "OBSERVER: Wait for observer to register"
      pause:
        seconds: 15
      tags: [observer]

    # ==========================================
    # STEP 6: Verify
    # ==========================================
    - name: "VERIFY: Check observer process trên máy thứ 3"
      shell: ps -ef | grep dgmgrl | grep -v grep || echo "(không có)"
      delegate_to: observerdb
      register: observer_proc
      changed_when: false
      tags: [observer, verify]

    - name: "VERIFY: Display observer process"
      debug:
        msg: "=== OBSERVER (192.168.1.18) === {{ observer_proc.stdout }}"
      tags: [observer, verify]

    - name: "VERIFY: Show FSFO configuration"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        SHOW CONFIGURATION VERBOSE;
        SHOW FAST_START FAILOVER;
        EOF
      register: fsfo_status
      changed_when: false
      tags: [verify]

    - name: "VERIFY: Display FSFO status"
      debug:
        msg: "{{ fsfo_status.stdout_lines }}"
      tags: [verify]

    - name: "Summary"
      debug:
        msg:
          - "====================================="
          - "FAST-START FAILOVER — HA OBSERVERS"
          - "====================================="
          - ""
          - "Threshold   : {{ fsfo_threshold }}s"
          - "Lag Limit   : {{ fsfo_lag_limit }}s"
          - "AutoReinstate: TRUE"
          - ""
          - "Observer:"
          - "  observer → chạy trên 192.168.1.18 (máy thứ 3, độc lập)"
          - ""
          - "Kịch bản:"
          - "  195 chết → observer (18) thấy mất kết nối → hỏi 196 xác nhận → 196 lên PRIMARY"
          - "  196 chết → observer (18) vẫn monitor primary, không trigger failover"
          - "  18 chết  → FSFO tạm dừng, DB vẫn hoạt động bình thường"
          - ""
          - "Check observer log:"
          - "  ssh hunglk@192.168.1.18 'tail -f ~/oracle-observer/observer.log'"
          - ""
          - "Test:"
          - "  1. uv run load_test.py"
          - "  2. systemctl stop oracle-db  (trên 195)"
          - "  3. Chờ ~{{ fsfo_threshold }}s → 196 tự lên PRIMARY"
          - "  4. load_test.py tự failover sang 196"
          - ""
          - "Sau khi 195 lên lại (AutoReinstate=TRUE → tự reinstate):"
          - "  Hoặc chạy thủ công: ansible-playbook setup_fsfo.yml --tags reinstate"
          - "====================================="
      tags: [always]

# ==========================================
# REINSTATE: Đưa old Primary trở lại thành Standby
# Chạy sau khi FSFO đã xảy ra VÀ Primary 195 đã lên lại
# Thường không cần vì FastStartFailoverAutoReinstate = TRUE
# ==========================================
- name: Reinstate old Primary sau FSFO
  hosts: primary
  become: yes
  vars:
    oracle_home: /u01/app/oracle/product/21c/dbhome_1
    oracle_sid: ORCL
    oracle_unique_name: ORCL
    standby_unique_name: ORCL_STBY
    primary_ip: 192.168.1.195
    standby_ip: 192.168.1.196
    sys_password: "Oracle_4U"
  tasks:

    - name: "REINSTATE: Show current configuration"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ standby_unique_name }} << 'EOF'
        SHOW CONFIGURATION;
        EOF
      register: config_post
      failed_when: false
      changed_when: false
      tags: [reinstate]

    - name: "REINSTATE: Display config"
      debug:
        msg: "{{ config_post.stdout_lines }}"
      tags: [reinstate]

    - name: "REINSTATE: Reinstate database ORCL (old primary → standby)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ standby_unique_name }} << 'EOF'
        REINSTATE DATABASE '{{ oracle_unique_name }}';
        EOF
      register: reinstate_result
      failed_when: false
      tags: [reinstate]

    - name: "REINSTATE: Show result"
      debug:
        msg: "{{ reinstate_result.stdout_lines }}"
      tags: [reinstate]

    - name: "REINSTATE: Restart observer trên máy thứ 3"
      shell: |
        pkill -f "dgmgrl" || true
        sleep 2
        mkdir -p /home/hunglk/oracle-observer
        DGMGRL_BIN=$(find /opt /usr/local /home -name dgmgrl 2>/dev/null | head -1)
        (echo "START OBSERVER observer"; tail -f /dev/null) | \
          nohup $DGMGRL_BIN -silent sys/{{ sys_password }}@{{ oracle_unique_name }} \
          > /home/hunglk/oracle-observer/observer.log 2>&1 &
        echo "Observer restarted PID: $!"
      delegate_to: observerdb
      async: 10
      poll: 0
      failed_when: false
      tags: [reinstate]

    - name: "REINSTATE: Verify final state"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ standby_unique_name }} << 'EOF'
        SHOW CONFIGURATION;
        SHOW FAST_START FAILOVER;
        EOF
      register: final_status
      failed_when: false
      changed_when: false
      tags: [reinstate]

    - name: "REINSTATE: Display final status"
      debug:
        msg: "{{ final_status.stdout_lines }}"
      tags: [reinstate]
