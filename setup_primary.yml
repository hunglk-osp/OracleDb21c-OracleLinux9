# setup_primary.yml
# Cấu hình Data Guard - PRIMARY
# Chạy trực tiếp trên Primary server:
#   ansible-playbook setup_primary.yml
#
# Lần đầu chạy: nhập password SSH của Standby 1 lần khi được hỏi
# Sau khi chạy xong -> chạy setup_standby.yml trên Standby server
# Sau khi setup_standby.yml xong -> chạy lại file này với --tags broker
---
- name: Setup Oracle Data Guard - Primary
  hosts: localhost
  connection: local
  become: yes
  vars:
    oracle_home: /u01/app/oracle/product/21c/dbhome_1
    oracle_base: /u01/app/oracle
    oracle_sid: ORCL
    oracle_unique_name: ORCL
    standby_unique_name: ORCL_STBY
    primary_ip: 192.168.1.195
    standby_ip: 192.168.1.196
    listener_port: 1521
    fra_dest: /u01/app/oracle/fast_recovery_area
    fra_size: 20G
    sys_password: "Oracle_4U"

  tasks:

    # ==========================================
    # STEP 1: Setup SSH Key Primary → Standby
    # ==========================================
    - name: "DG-P1: Ensure .ssh directory"
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'
      tags: [ssh_setup]

    - name: "DG-P1: Generate SSH key (nếu chưa có)"
      shell: ssh-keygen -t rsa -b 4096 -N "" -f /root/.ssh/id_rsa
      args:
        creates: /root/.ssh/id_rsa
      tags: [ssh_setup]

    - name: "DG-P1: Copy SSH key sang Standby (hỏi password 1 lần)"
      shell: |
        ssh-copy-id -o StrictHostKeyChecking=no root@{{ standby_ip }}
        touch /root/.ssh/.ssh_copy_done_{{ standby_ip }}
      args:
        creates: /root/.ssh/.ssh_copy_done_{{ standby_ip }}
      tags: [ssh_setup]

    - name: "DG-P1: Verify SSH"
      shell: ssh -o StrictHostKeyChecking=no -o BatchMode=yes root@{{ standby_ip }} "echo OK"
      register: ssh_test
      changed_when: false
      failed_when: ssh_test.rc != 0
      tags: [ssh_setup]

    # ==========================================
    # STEP 2: Bật Archive Log Mode (idempotent)
    # ==========================================
    - name: "DG-P2: Check Archive Log mode"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF
        SELECT LOG_MODE FROM V$DATABASE;
        EXIT;
        EOF
      register: archivelog_check
      changed_when: false
      tags: [archivelog]

    - name: "DG-P2: Enable Archive Log mode (chỉ nếu chưa bật)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SHUTDOWN IMMEDIATE;
        STARTUP MOUNT;
        ALTER DATABASE ARCHIVELOG;
        ALTER DATABASE OPEN;
        ALTER PLUGGABLE DATABASE ALL OPEN;
        EXIT;
        EOF
      when: "'NOARCHIVELOG' in archivelog_check.stdout"
      tags: [archivelog]

    # ==========================================
    # STEP 3: Force Logging + Flashback (idempotent)
    # ==========================================
    - name: "DG-P3: Check Force Logging và Flashback"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF
        SELECT FORCE_LOGGING, FLASHBACK_ON FROM V$DATABASE;
        EXIT;
        EOF
      register: fl_check
      changed_when: false
      tags: [force_logging]

    - name: "DG-P3: Enable Force Logging (chỉ nếu chưa bật)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER DATABASE FORCE LOGGING;
        ALTER SYSTEM SWITCH LOGFILE;
        EXIT;
        EOF
      when: "'YES' not in fl_check.stdout.split()[0]"
      tags: [force_logging]

    - name: "DG-P3: Enable Flashback (chỉ nếu chưa bật)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER DATABASE FLASHBACK ON;
        EXIT;
        EOF
      when: "'YES' not in fl_check.stdout.split()[1] | default('')"
      failed_when: false
      tags: [force_logging]

    # ==========================================
    # STEP 4: Fast Recovery Area (idempotent)
    # ==========================================
    - name: "DG-P4: Create FRA directory"
      file:
        path: "{{ fra_dest }}"
        state: directory
        owner: oracle
        group: oinstall
        mode: '0755'
      tags: [fra]

    - name: "DG-P4: Check FRA params hiện tại"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF
        SELECT VALUE FROM V$PARAMETER WHERE NAME='db_recovery_file_dest';
        EXIT;
        EOF
      register: fra_check
      changed_when: false
      tags: [fra]

    - name: "DG-P4: Configure FRA parameters (chỉ nếu chưa set)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER SYSTEM SET DB_RECOVERY_FILE_DEST_SIZE={{ fra_size }} SCOPE=BOTH;
        ALTER SYSTEM SET DB_RECOVERY_FILE_DEST='{{ fra_dest }}' SCOPE=BOTH;
        EXIT;
        EOF
      when: "fra_dest not in fra_check.stdout"
      tags: [fra]

    # ==========================================
    # STEP 5: Standby Redo Logs (idempotent)
    # ==========================================
    - name: "DG-P5: Check Standby Redo Logs"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF
        SELECT COUNT(*) FROM V$LOGFILE WHERE TYPE='STANDBY';
        EXIT;
        EOF
      register: srl_check
      changed_when: false
      tags: [standby_redo]

    - name: "DG-P5: Create Standby Redo Logs (chỉ nếu chưa có)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 10 SIZE 50M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 11 SIZE 50M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 12 SIZE 50M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 13 SIZE 50M;
        EXIT;
        EOF
      when: "'0' in srl_check.stdout"
      tags: [standby_redo]

    # ==========================================
    # STEP 6: DG Init Parameters (idempotent)
    # QUAN TRỌNG: Không set LOG_ARCHIVE_DEST_2
    # vì DG Broker tự quản lý log shipping
    # ==========================================
    - name: "DG-P6: Check DG params đã set chưa"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF
        SELECT VALUE FROM V$PARAMETER WHERE NAME='log_archive_config';
        EXIT;
        EOF
      register: dg_params_check
      changed_when: false
      tags: [dg_params]

    - name: "DG-P6: Set Data Guard init parameters (chỉ nếu chưa set)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER SYSTEM SET DB_UNIQUE_NAME='{{ oracle_unique_name }}' SCOPE=SPFILE;
        ALTER SYSTEM SET LOG_ARCHIVE_CONFIG='DG_CONFIG=({{ oracle_unique_name }},{{ standby_unique_name }})' SCOPE=BOTH;
        ALTER SYSTEM SET LOG_ARCHIVE_DEST_1='LOCATION=USE_DB_RECOVERY_FILE_DEST VALID_FOR=(ALL_LOGFILES,ALL_ROLES) DB_UNIQUE_NAME={{ oracle_unique_name }}' SCOPE=BOTH;
        ALTER SYSTEM SET LOG_ARCHIVE_DEST_STATE_1=ENABLE SCOPE=BOTH;
        ALTER SYSTEM SET LOG_ARCHIVE_FORMAT='%t_%s_%r.dbf' SCOPE=SPFILE;
        ALTER SYSTEM SET LOG_ARCHIVE_MAX_PROCESSES=4 SCOPE=BOTH;
        ALTER SYSTEM SET REMOTE_LOGIN_PASSWORDFILE=EXCLUSIVE SCOPE=SPFILE;
        ALTER SYSTEM SET FAL_SERVER='{{ standby_unique_name }}' SCOPE=BOTH;
        ALTER SYSTEM SET FAL_CLIENT='{{ oracle_unique_name }}' SCOPE=BOTH;
        ALTER SYSTEM SET STANDBY_FILE_MANAGEMENT=AUTO SCOPE=BOTH;
        ALTER SYSTEM SET DG_BROKER_START=TRUE SCOPE=BOTH;
        EXIT;
        EOF
      when: "standby_unique_name not in dg_params_check.stdout"
      register: dg_params_set
      tags: [dg_params]

    # ==========================================
    # STEP 7: Network config (idempotent via copy module)
    # ==========================================
    - name: "DG-P7: Configure tnsnames.ora"
      copy:
        dest: "{{ oracle_home }}/network/admin/tnsnames.ora"
        owner: oracle
        group: oinstall
        content: |
          {{ oracle_unique_name }} =
            (DESCRIPTION =
              (ADDRESS = (PROTOCOL = TCP)(HOST = {{ primary_ip }})(PORT = {{ listener_port }}))
              (CONNECT_DATA = (SERVICE_NAME = {{ oracle_sid }})))

          {{ standby_unique_name }} =
            (DESCRIPTION =
              (ADDRESS = (PROTOCOL = TCP)(HOST = {{ standby_ip }})(PORT = {{ listener_port }}))
              (CONNECT_DATA = (SERVICE_NAME = {{ oracle_sid }})))
      tags: [tns]

    - name: "DG-P8: Configure listener.ora"
      copy:
        dest: "{{ oracle_home }}/network/admin/listener.ora"
        owner: oracle
        group: oinstall
        content: |
          LISTENER =
            (DESCRIPTION_LIST =
              (DESCRIPTION =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ primary_ip }})(PORT = {{ listener_port }}))
                (ADDRESS = (PROTOCOL = IPC)(KEY = EXTPROC1521))
              )
            )

          SID_LIST_LISTENER =
            (SID_LIST =
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_sid }})
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_sid }}_DGMGRL)
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
            )
      register: listener_config
      tags: [listener]

    - name: "DG-P8: Reload listener (chỉ nếu config thay đổi)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} PATH={{ oracle_home }}/bin:$PATH
        lsnrctl reload
      when: listener_config.changed
      tags: [listener]

    # ==========================================
    # STEP 9: Restart DB chỉ khi cần (SPFILE params)
    # ==========================================
    - name: "DG-P9: Restart DB để áp dụng SPFILE changes (chỉ nếu params vừa thay đổi)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SHUTDOWN IMMEDIATE;
        STARTUP;
        ALTER PLUGGABLE DATABASE ALL OPEN;
        EXIT;
        EOF
      when: dg_params_set is defined and dg_params_set.changed
      tags: [restart]

    # ==========================================
    # STEP 10: Copy Password File sang Standby (idempotent)
    # ==========================================
    - name: "DG-P10: Check password file trên Standby đã đúng chưa"
      shell: |
        ssh -o StrictHostKeyChecking=no root@{{ standby_ip }} \
          "md5sum {{ oracle_base }}/dbs/orapw{{ oracle_sid }} 2>/dev/null || echo MISSING"
      register: stby_pwd_check
      changed_when: false
      failed_when: false
      tags: [pwdfile]

    - name: "DG-P10: Get MD5 của password file trên Primary"
      shell: md5sum {{ oracle_base }}/dbs/orapw{{ oracle_sid }}
      register: primary_pwd_md5
      changed_when: false
      tags: [pwdfile]

    - name: "DG-P10: Copy password file sang Standby (chỉ nếu khác hoặc thiếu)"
      shell: |
        scp -o StrictHostKeyChecking=no \
          {{ oracle_base }}/dbs/orapw{{ oracle_sid }} \
          root@{{ standby_ip }}:{{ oracle_base }}/dbs/orapw{{ oracle_sid }}
        ssh -o StrictHostKeyChecking=no root@{{ standby_ip }} \
          "chown oracle:oinstall {{ oracle_base }}/dbs/orapw{{ oracle_sid }}"
      when: >
        'MISSING' in stby_pwd_check.stdout or
        primary_pwd_md5.stdout.split()[0] not in stby_pwd_check.stdout
      tags: [pwdfile]

    # ==========================================
    # STEP 11: DG Broker Configuration (idempotent)
    # Chạy sau khi setup_standby.yml đã xong RMAN
    # ==========================================
    - name: "DG-P11: Check Broker configuration"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        SHOW CONFIGURATION;
        EXIT;
        EOF
      register: broker_config_check
      failed_when: false
      changed_when: false
      tags: [broker]

    - name: "DG-P11: Create Broker configuration (chỉ nếu chưa có)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        CREATE CONFIGURATION 'DG_{{ oracle_sid }}' AS
          PRIMARY DATABASE IS '{{ oracle_unique_name }}'
          CONNECT IDENTIFIER IS '{{ oracle_unique_name }}';
        EXIT;
        EOF
      when: "'ORA-16532' in broker_config_check.stdout"
      tags: [broker]

    - name: "DG-P11: Check ORCL_STBY trong Broker"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        SHOW DATABASE '{{ standby_unique_name }}';
        EXIT;
        EOF
      register: broker_stby_check
      failed_when: false
      changed_when: false
      tags: [broker]

    - name: "DG-P11: ADD Standby + ENABLE (chỉ nếu chưa có)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        ADD DATABASE '{{ standby_unique_name }}'
          AS CONNECT IDENTIFIER IS '{{ standby_unique_name }}'
          MAINTAINED AS PHYSICAL;
        ENABLE CONFIGURATION;
        EXIT;
        EOF
      when: >
        'was not found' in broker_stby_check.stdout or
        'ORA-16532' in broker_stby_check.stdout
      register: broker_add_result
      failed_when: false
      tags: [broker]

    - name: "DG-P11: Debug ADD result"
      debug:
        msg: "{{ broker_add_result.stdout_lines }}"
      when: broker_add_result is not skipped
      tags: [broker]

    - name: "DG-P11: Chờ Broker ổn định"
      pause:
        seconds: 20
      tags: [broker]

    - name: "DG-P11: Verify DG configuration"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl / << 'EOF'
        SHOW CONFIGURATION;
        SHOW DATABASE VERBOSE '{{ oracle_unique_name }}';
        SHOW DATABASE VERBOSE '{{ standby_unique_name }}';
        EXIT;
        EOF
      register: dg_final
      changed_when: false
      tags: [broker, validate]

    - name: "DG-P11: Show DG status"
      debug:
        msg: "{{ dg_final.stdout_lines }}"
      tags: [broker, validate]

    # ==========================================
    # SUMMARY
    # ==========================================
    - name: "Primary setup hoàn tất"
      debug:
        msg:
          - "============================================"
          - "Data Guard PRIMARY setup HOÀN TẤT"
          - "============================================"
          - "Primary  : {{ oracle_unique_name }} @ {{ primary_ip }}"
          - "Standby  : {{ standby_unique_name }} @ {{ standby_ip }}"
          - ""
          - "Workflow:"
          - "  1. setup_primary.yml  ← đã xong"
          - "  2. setup_standby.yml trên {{ standby_ip }}"
          - "  3. setup_primary.yml --tags broker (sau khi standby xong)"
          - "============================================"
      tags: [always]
