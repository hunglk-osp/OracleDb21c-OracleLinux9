# ansible.cfg
[defaults]
inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False
log_path = ./ansible.log
# Tăng timeout cho các tác vụ lâu (DBCA, RMAN duplicate)
timeout = 3600
# Cho phép pipelining để SSH nhanh hơn (cần requiretty=False trong sudoers)
pipelining = True

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10
connect_timeout = 60

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
