# install_oracle21c_standby.yml
# Oracle Database 21c on Oracle Linux 9 - STANDBY SERVER
# Dùng cho server: 192.168.1.196
#
# Fixes so với bản gốc:
# [FIX-1] hostname KHÁC với primary (primarydb.local vs standbydb.local)
#         → tránh Broker build StaticConnectIdentifier trỏ sai IP
# [FIX-2] listener.ora dùng đúng IP standby + thêm ORCL_STBY_DGMGRL entry
#         → Broker kết nối static vào standby đúng
# [FIX-3] DB_UNIQUE_NAME set = ORCL_STBY ngay từ SPFILE sau install
#         → RMAN duplicate không cần phải override lại
# [FIX-4] DG_BROKER_CONFIG_FILE set đúng path (Oracle 21c read-only home)
# [FIX-5] KHÔNG tạo database bằng DBCA — standby DB sẽ được tạo bởi RMAN duplicate
# [FIX-6] oradism suid bit preserved
# [FIX-7] systemd service chạy as root
---
- name: Install Oracle Database 21c on Oracle Linux 9 - STANDBY
  hosts: standby
  become: yes
  vars:
    oracle_base: /u01/app/oracle
    oracle_home: /u01/app/oracle/product/21c/dbhome_1
    oracle_inventory: /u01/app/oraInventory
    oracle_sid: ORCL
    oracle_unique_name: ORCL_STBY                    # [FIX-3] DB_UNIQUE_NAME của standby
    sys_password: "Oracle_4U"
    hostname_fqdn: standbydb.local                   # [FIX-1] Khác với primary (primarydb.local)
    hostname_short: standbydb
    primary_ip: 192.168.1.195                        # IP của Primary server
    listener_port: 1521
    zip_file_remote: "/root/OracleDb21c-OracleLinux9/LINUX.X64_213000_db_home.zip"
    cv_assume_distid: "OEL8.4"
    fra_dest: /u01/app/oracle/fast_recovery_area

  tasks:
    # ==========================================
    # STEP 0: Prerequisites
    # ==========================================
    - name: "STEP 0: Check prerequisites"
      block:
        - name: Check Oracle Linux
          stat:
            path: /etc/oracle-release
          register: oracle_release
          failed_when: not oracle_release.stat.exists

        - name: Get OL version
          shell: cat /etc/oracle-release | grep -oP 'release \K[0-9]+' | head -1
          register: ol_version
          changed_when: false

        - name: Verify OL9
          assert:
            that: ol_version.stdout == "9"
            fail_msg: "Requires Oracle Linux 9"

        - name: Display resources
          debug:
            msg:
              - "RAM: {{ ansible_memtotal_mb }}MB"
              - "Swap: {{ ansible_swaptotal_mb }}MB"
              - "CPU: {{ ansible_processor_vcpus }}"

        - name: Warn low RAM
          debug:
            msg: "WARNING: RAM < 8GB"
          when: ansible_memtotal_mb < 8192
      tags: [prerequisites, always]

    # ==========================================
    # STEP 1: OS Preparation
    # ==========================================
    - name: "STEP 1.1: Update OS"
      dnf:
        name: "*"
        state: latest
        update_cache: yes
      tags: [os_prep]

    - name: "STEP 1.2: Download compat-openssl10"
      get_url:
        url: https://yum.oracle.com/repo/OracleLinux/OL8/appstream/x86_64/getPackage/compat-openssl10-1.0.2o-4.el8_6.x86_64.rpm
        dest: /tmp/compat-openssl10.rpm
      tags: [os_prep]

    - name: "STEP 1.2: Download oracle-preinstall-21c"
      get_url:
        url: https://yum.oracle.com/repo/OracleLinux/OL8/appstream/x86_64/getPackage/oracle-database-preinstall-21c-1.0-1.el8.x86_64.rpm
        dest: /tmp/oracle-preinstall-21c.rpm
      tags: [os_prep]

    - name: "STEP 1.2: Install compat-openssl10"
      dnf:
        name: /tmp/compat-openssl10.rpm
        state: present
        disable_gpg_check: yes
      environment:
        CV_ASSUME_DISTID: "{{ cv_assume_distid }}"
      tags: [os_prep]

    - name: "STEP 1.2: Install oracle-preinstall-21c"
      dnf:
        name: /tmp/oracle-preinstall-21c.rpm
        state: present
        disable_gpg_check: yes
      environment:
        CV_ASSUME_DISTID: "{{ cv_assume_distid }}"
      tags: [os_prep]

    - name: "STEP 1.2.1: Ensure groups"
      group:
        name: "{{ item.name }}"
        gid: "{{ item.gid }}"
        state: present
      loop:
        - { name: oinstall, gid: 54321 }
        - { name: dba,      gid: 54322 }
        - { name: oper,     gid: 54323 }
        - { name: backupdba,gid: 54324 }
        - { name: dgdba,    gid: 54325 }
        - { name: kmdba,    gid: 54326 }
        - { name: racdba,   gid: 54327 }
      tags: [os_prep]

    - name: "STEP 1.2.1: Ensure oracle user"
      user:
        name: oracle
        uid: 54321
        group: oinstall
        groups: dba,oper,backupdba,dgdba,kmdba,racdba
        home: /home/oracle
        shell: /bin/bash
        create_home: yes
      tags: [os_prep]

    - name: "STEP 1.2.1: Set oracle password"
      user:
        name: oracle
        password: "{{ 'Oracle123' | password_hash('sha512') }}"
      tags: [os_prep]

    - name: "STEP 1.2.2: Configure oracle .bash_profile"
      blockinfile:
        path: /home/oracle/.bash_profile
        marker: "# {mark} ANSIBLE MANAGED - Oracle"
        block: |
          export ORACLE_BASE={{ oracle_base }}
          export ORACLE_HOME={{ oracle_home }}
          export ORACLE_SID={{ oracle_sid }}
          export ORACLE_UNIQ_NAME={{ oracle_unique_name }}
          export PATH=$ORACLE_HOME/bin:$PATH
          export LD_LIBRARY_PATH=$ORACLE_HOME/lib:/lib:/usr/lib
          export NLS_LANG=AMERICAN_AMERICA.AL32UTF8
          export CV_ASSUME_DISTID={{ cv_assume_distid }}
        create: yes
        owner: oracle
        group: oinstall
      tags: [os_prep]

    - name: "STEP 1.3: Install additional packages"
      dnf:
        name:
          - gcc
          - gcc-c++
          - glibc-devel
          - ksh
          - libaio-devel
          - libstdc++-devel
          - make
          - nfs-utils
          - sysstat
          - unzip
          - wget
          - vim
        state: present
      tags: [os_prep]

    - name: "STEP 1.4: Create directories"
      file:
        path: "{{ item }}"
        state: directory
        owner: oracle
        group: oinstall
        mode: '0755'
      loop:
        - "{{ oracle_home }}"
        - "{{ oracle_inventory }}"
        - "{{ fra_dest }}"             # Tạo sẵn FRA dir cho RMAN duplicate
      tags: [os_prep]

    - name: "STEP 1.5: Configure root .bash_profile"
      blockinfile:
        path: /root/.bash_profile
        marker: "# {mark} ANSIBLE MANAGED - Oracle"
        block: |
          export ORACLE_BASE={{ oracle_base }}
          export ORACLE_HOME={{ oracle_home }}
          export ORACLE_SID={{ oracle_sid }}
          export PATH=$ORACLE_HOME/bin:$PATH
          export LD_LIBRARY_PATH=$ORACLE_HOME/lib:/lib:/usr/lib
          export NLS_LANG=AMERICAN_AMERICA.AL32UTF8
          export CV_ASSUME_DISTID={{ cv_assume_distid }}
        create: yes
      tags: [os_prep]

    # [FIX-1] hostname PHẢI khác primary
    - name: "STEP 1.6: Set hostname (standby)"
      hostname:
        name: "{{ hostname_fqdn }}"
      tags: [os_prep]

    - name: "STEP 1.6: Get server IP"
      set_fact:
        server_ip: "{{ ansible_default_ipv4.address }}"
      tags: [os_prep, always]

    - name: "STEP 1.6: Update /etc/hosts (self)"
      lineinfile:
        path: /etc/hosts
        regexp: ".*{{ hostname_short }}.*"
        line: "{{ server_ip }}  {{ hostname_fqdn }}  {{ hostname_short }}"
      tags: [os_prep]

    - name: "STEP 1.6: Update /etc/hosts (primary cross-entry)"
      lineinfile:
        path: /etc/hosts
        regexp: ".*primarydb.*"
        line: "192.168.1.195  primarydb.local  primarydb"
      tags: [os_prep]

    # ==========================================
    # STEP 2: Extract Software
    # ==========================================
    - name: "STEP 2.1: Verify ZIP on remote"
      stat:
        path: "{{ zip_file_remote }}"
      register: zip_remote
      failed_when: not zip_remote.stat.exists
      tags: [software]

    - name: "STEP 2.3: Check extracted"
      stat:
        path: "{{ oracle_home }}/runInstaller"
      register: runinstaller
      tags: [software]

    - name: "STEP 2.3: Extract ZIP"
      unarchive:
        src: "{{ zip_file_remote }}"
        dest: "{{ oracle_home }}"
        remote_src: yes
      when: not runinstaller.stat.exists
      tags: [software]

    - name: "STEP 2.3: Set ownership"
      file:
        path: "{{ oracle_home }}"
        owner: oracle
        group: oinstall
        recurse: yes
      tags: [software]

    - name: "STEP 2.3: Set runInstaller perms"
      file:
        path: "{{ oracle_home }}/runInstaller"
        mode: '0755'
      tags: [software]

    # ==========================================
    # STEP 3: Fix OL9 Compatibility
    # ==========================================
    - name: "STEP 3.1: Install compat libraries"
      dnf:
        name:
          - libaio
          - libaio-devel
          - libstdc++
          - libstdc++-devel
          - gcc
          - gcc-c++
          - make
          - glibc-devel
          - compat-openssl10
          - libnsl2
        state: present
      tags: [compatibility]

    - name: "STEP 3.2: Check libpthread"
      stat:
        path: /usr/lib64/libpthread_nonshared.a
      register: libpthread
      tags: [compatibility]

    - name: "STEP 3.2: Create dummy libpthread"
      shell: ar rc /usr/lib64/libpthread_nonshared.a
      when: not libpthread.stat.exists or libpthread.stat.size == 8
      tags: [compatibility]

    - name: "STEP 3.3: Fix LDFLAGS"
      lineinfile:
        path: "{{ oracle_home }}/rdbms/lib/env_rdbms.mk"
        regexp: '^LDFLAGS='
        line: 'LDFLAGS= -lnsl '
        backrefs: yes
      tags: [compatibility]

    - name: "STEP 3.4: Create stat_wrap.c"
      copy:
        dest: /tmp/stat_wrap.c
        content: |
          #define _GNU_SOURCE
          #include <sys/stat.h>
          #include <sys/types.h>
          #include <unistd.h>
          #include <fcntl.h>
          int stat(const char *path, struct stat *buf) {
              return syscall(4, path, buf);
          }
          int fstat(int fd, struct stat *buf) {
              return syscall(5, fd, buf);
          }
      tags: [compatibility]

    - name: "STEP 3.4: Compile stat_wrap"
      shell: gcc -c /tmp/stat_wrap.c -o /tmp/stat_wrap.o
      args:
        creates: /tmp/stat_wrap.o
      tags: [compatibility]

    - name: "STEP 3.4: Check marker file (idempotent)"
      stat:
        path: "{{ oracle_home }}/lib/.stat_wrap_injected"
      register: stat_wrap_marker
      tags: [compatibility]

    - name: "STEP 3.4: Check injection libnnzst"
      stat:
        path: "{{ oracle_home }}/lib/libnnzst.a"
      register: stat_nnzst
      when: not stat_wrap_marker.stat.exists
      tags: [compatibility]

    - name: "STEP 3.4: Inject libnnzst"
      shell: ar r {{ oracle_home }}/lib/libnnzst.a /tmp/stat_wrap.o
      when: not stat_wrap_marker.stat.exists and stat_nnzst.stat.exists | default(false)
      tags: [compatibility]

    - name: "STEP 3.4: Check injection libjavavm"
      stat:
        path: "{{ oracle_home }}/lib/libjavavm.a"
      register: stat_javavm
      when: not stat_wrap_marker.stat.exists
      tags: [compatibility]

    - name: "STEP 3.4: Inject libjavavm"
      shell: ar r {{ oracle_home }}/lib/libjavavm.a /tmp/stat_wrap.o
      when: not stat_wrap_marker.stat.exists and stat_javavm.stat.exists | default(false)
      tags: [compatibility]

    - name: "STEP 3.4: Create marker file"
      file:
        path: "{{ oracle_home }}/lib/.stat_wrap_injected"
        state: touch
        owner: oracle
        group: oinstall
      when: not stat_wrap_marker.stat.exists
      tags: [compatibility]

    # ==========================================
    # STEP 4: Install Oracle Software Only
    # (KHÔNG tạo DB — standby DB do RMAN tạo)
    # ==========================================
    - name: "STEP 4.1: Create response file"
      copy:
        dest: /tmp/db_install.rsp
        content: |
          oracle.install.responseFileVersion=/oracle/install/rspfmt_dbinstall_response_schema_v21.0.0
          oracle.install.option=INSTALL_DB_SWONLY
          UNIX_GROUP_NAME=oinstall
          INVENTORY_LOCATION={{ oracle_inventory }}
          ORACLE_HOME={{ oracle_home }}
          ORACLE_BASE={{ oracle_base }}
          oracle.install.db.InstallEdition=EE
          oracle.install.db.OSDBA_GROUP=dba
          oracle.install.db.OSOPER_GROUP=oper
          oracle.install.db.OSBACKUPDBA_GROUP=dba
          oracle.install.db.OSDGDBA_GROUP=dba
          oracle.install.db.OSKMDBA_GROUP=dba
          oracle.install.db.OSRACDBA_GROUP=dba
          oracle.install.db.rootconfig.executeRootScript=false
      tags: [install]

    - name: "STEP 4.1.5: Ensure ownership"
      file:
        path: "{{ item }}"
        owner: oracle
        group: oinstall
        mode: '0755'
        recurse: yes
        state: directory
      loop:
        - /u01
        - "{{ oracle_base }}"
        - "{{ oracle_home }}"
        - "{{ oracle_inventory }}"
      tags: [install]

    - name: "STEP 4.2: Check installed"
      stat:
        path: "{{ oracle_inventory }}/ContentsXML/inventory.xml"
      register: inventory_xml
      tags: [install]

    - name: "STEP 4.2: Run runInstaller (10-20 min)"
      become_user: oracle
      shell: |
        export CV_ASSUME_DISTID={{ cv_assume_distid }}
        export ORACLE_BASE={{ oracle_base }}
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/runInstaller -silent \
          -responseFile /tmp/db_install.rsp \
          -ignorePrereqFailure \
          -waitforcompletion
      register: runinstaller_out
      when: not inventory_xml.stat.exists
      failed_when:
        - runinstaller_out.rc != 0
        - "'Successfully Setup Software' not in runinstaller_out.stdout"
      async: 3600
      poll: 30
      tags: [install]

    - name: "STEP 4.3: Check orainstRoot"
      stat:
        path: "{{ oracle_inventory }}/orainstRoot.sh"
      register: orainstroot
      tags: [install]

    - name: "STEP 4.3: Run orainstRoot"
      shell: "{{ oracle_inventory }}/orainstRoot.sh"
      when: orainstroot.stat.exists
      tags: [install]

    - name: "STEP 4.3: Check root.sh"
      stat:
        path: "{{ oracle_home }}/root.sh"
      register: rootsh
      tags: [install]

    - name: "STEP 4.3: Run root.sh"
      shell: "{{ oracle_home }}/root.sh"
      when: rootsh.stat.exists
      tags: [install]

    # [FIX-6] oradism suid
    - name: "STEP 4.4: Fix oradism suid permission"
      file:
        path: "{{ oracle_home }}/bin/oradism"
        owner: root
        group: oinstall
        mode: '4750'
      tags: [install, autostart]

    # ==========================================
    # STEP 5: Listener (Software Only — không có DB)
    # ==========================================
    - name: "STEP 5.1: Check listener"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        lsnrctl status
      register: listener_status
      failed_when: false
      changed_when: false
      tags: [listener]

    - name: "STEP 5.1: Create listener via netca"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        netca -silent -responseFile $ORACLE_HOME/assistants/netca/netca.rsp
      when: "'TNS-12541' in listener_status.stderr or 'TNS-01106' in listener_status.stderr"
      tags: [listener]

    # [FIX-2] listener.ora STANDBY:
    # - HOST dùng đúng IP standby (server_ip = 192.168.1.196)
    # - Cần cả ORCL_STBY/ORCL_STBY_DGMGRL (tên riêng standby) VÀ ORCL/ORCL_DGMGRL (tên primary)
    # - ORCL/ORCL_DGMGRL để Observer ping được Standby khi Primary down (FSFO requirement)
    - name: "STEP 5.3: Create listener.ora (STANDBY)"
      copy:
        dest: "{{ oracle_home }}/network/admin/listener.ora"
        force: yes
        content: |
          LISTENER =
            (DESCRIPTION_LIST =
              (DESCRIPTION =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ server_ip }})(PORT = {{ listener_port }}))
                (ADDRESS = (PROTOCOL = IPC)(KEY = EXTPROC1521))
              )
            )
          SID_LIST_LISTENER =
            (SID_LIST =
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_unique_name }})
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_unique_name }}_DGMGRL)
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_sid }})
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_sid }}_DGMGRL)
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
              (SID_DESC =
                (GLOBAL_DBNAME = orclpdb1)
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
            )
        owner: oracle
        group: oinstall
      tags: [listener]

    - name: "STEP 5.3: Restart listener"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        lsnrctl stop || true
        sleep 2
        lsnrctl start
      tags: [listener]

    # ==========================================
    # STEP 6: Network — tnsnames.ora trên Standby
    # Cần resolve được cả 2 TNS alias để RMAN kết nối
    # ==========================================
    - name: "STEP 6.1: Create tnsnames.ora (STANDBY)"
      copy:
        dest: "{{ oracle_home }}/network/admin/tnsnames.ora"
        content: |
          ORCL =
            (DESCRIPTION =
              (ADDRESS = (PROTOCOL = TCP)(HOST = {{ primary_ip }})(PORT = {{ listener_port }}))
              (CONNECT_DATA = (SID = {{ oracle_sid }})))

          ORCL_STBY =
            (DESCRIPTION =
              (ADDRESS = (PROTOCOL = TCP)(HOST = {{ server_ip }})(PORT = {{ listener_port }}))
              (CONNECT_DATA = (SID = {{ oracle_sid }})))
        owner: oracle
        group: oinstall
      tags: [network]

    - name: "STEP 6.2: Open firewall"
      firewalld:
        port: "{{ listener_port }}/tcp"
        permanent: yes
        state: enabled
        immediate: yes
      tags: [network]

    # ==========================================
    # STEP 7: Tạo init file tối thiểu cho NOMOUNT
    # RMAN duplicate cần instance có thể start NOMOUNT
    # ==========================================
    - name: "STEP 7: Detect homes dbs path"
      shell: |
        find {{ oracle_base }}/homes -maxdepth 3 -name "dbs" -type d 2>/dev/null | head -1 || \
        echo "{{ oracle_home }}/dbs"
      register: homes_dbs_path
      changed_when: false
      tags: [nomount_prep]

    - name: "STEP 7: Create minimal init.ora for NOMOUNT"
      copy:
        dest: "{{ oracle_home }}/dbs/init{{ oracle_sid }}.ora"
        content: |
          DB_NAME={{ oracle_sid }}
          DB_UNIQUE_NAME={{ oracle_unique_name }}
        owner: oracle
        group: oinstall
        force: no          # Không ghi đè nếu đã có (sau RMAN duplicate)
      tags: [nomount_prep]

    # ==========================================
    # STEP 8: Auto-start setup
    # ==========================================
    - name: "STEP 8.1: Disable SELinux"
      selinux:
        state: permissive
        policy: targeted
      tags: [autostart]

    # [FIX-6] Không recurse để bảo toàn suid oradism
    - name: "STEP 8.2: Set bin dir permission (no recurse)"
      file:
        path: "{{ oracle_home }}/bin"
        mode: '0755'
      tags: [autostart]

    - name: "STEP 8.2: Re-fix oradism suid"
      file:
        path: "{{ oracle_home }}/bin/oradism"
        owner: root
        group: oinstall
        mode: '4750'
      tags: [autostart]

    - name: "STEP 8.3: Configure oratab"
      lineinfile:
        path: /etc/oratab
        regexp: "^{{ oracle_sid }}:"
        line: "{{ oracle_sid }}:{{ oracle_home }}:Y"
      tags: [autostart]

    - name: "STEP 8.4: Fix dbstart/dbshut log permissions"
      file:
        path: "/u01/app/oracle/homes/OraDB21Home1/rdbms/log/{{ item }}"
        owner: oracle
        group: oinstall
        mode: '0644'
        state: touch
      loop:
        - startup.log
        - shutdown.log
      tags: [autostart]

    - name: "STEP 8.4b: Fix oradism ACL to preserve SUID"
      lineinfile:
        path: "{{ oracle_home }}/install/acls/ss_oracle.rdbms.acl"
        regexp: '^\d+\s+bin/oradism'
        line: '4750    bin/oradism'
      tags: [autostart]

    # [FIX-7] Service chạy as oracle user, wrapper script để fix oradism SUID trước khi dbstart
    - name: "STEP 8.5a: Create oracle-start wrapper"
      copy:
        dest: /usr/local/bin/oracle-start.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Fix oradism SUID before startup
          chown root:oinstall {{ oracle_home }}/bin/oradism
          chmod 4750 {{ oracle_home }}/bin/oradism
          # Start listener
          runuser -l oracle -c "lsnrctl start" || true
          # Start database via sqlplus
          runuser -l oracle -c "export ORACLE_SID={{ oracle_sid }}; sqlplus -s / as sysdba <<'EOSQL'
          STARTUP MOUNT;
          ALTER DATABASE OPEN{% if oracle_unique_name != oracle_sid %} READ ONLY{% endif %};
          ALTER PLUGGABLE DATABASE ALL OPEN;
          EXIT;
          EOSQL"
      tags: [autostart]

    - name: "STEP 8.5b: Create oracle-stop wrapper"
      copy:
        dest: /usr/local/bin/oracle-stop.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Stop database
          runuser -l oracle -c "export ORACLE_SID={{ oracle_sid }}; sqlplus -s / as sysdba <<'EOSQL'
          SHUTDOWN IMMEDIATE;
          EXIT;
          EOSQL"
          # Stop listener
          runuser -l oracle -c "lsnrctl stop" || true
      tags: [autostart]

    - name: "STEP 8.5c: Create systemd service"
      copy:
        dest: /etc/systemd/system/oracle-db.service
        content: |
          [Unit]
          Description=Oracle Database 21c (Standby)
          After=network.target

          [Service]
          Type=forking
          ExecStart=/usr/local/bin/oracle-start.sh
          ExecStop=/usr/local/bin/oracle-stop.sh
          RemainAfterExit=yes
          LimitMEMLOCK=infinity
          TimeoutStartSec=600
          TimeoutStopSec=600

          [Install]
          WantedBy=multi-user.target
      tags: [autostart]

    - name: "STEP 8.6: Enable service (chưa start — chưa có DB)"
      systemd:
        name: oracle-db
        enabled: yes
        daemon_reload: yes
      tags: [autostart]

    # ==========================================
    # [FIX-4] Set DG_BROKER_CONFIG_FILE đúng path
    # Cần set trong pfile tối thiểu vì DB chưa có SPFILE
    # Sau RMAN duplicate broker config path sẽ được giữ lại trong SPFILE mới
    # ==========================================
    - name: "STEP 9: Detect homes dbs path cho broker config"
      shell: |
        find {{ oracle_base }}/homes -maxdepth 3 -name "dbs" -type d 2>/dev/null | head -1 || \
        echo "{{ oracle_home }}/dbs"
      register: broker_dbs_path
      changed_when: false
      tags: [dg_prep]

    - name: "STEP 9: Append DG broker config path vào init.ora"
      blockinfile:
        path: "{{ oracle_home }}/dbs/init{{ oracle_sid }}.ora"
        marker: "# {mark} ANSIBLE MANAGED - DG Broker"
        block: |
          DG_BROKER_CONFIG_FILE1={{ broker_dbs_path.stdout }}/dr1{{ oracle_sid }}.dat
          DG_BROKER_CONFIG_FILE2={{ broker_dbs_path.stdout }}/dr2{{ oracle_sid }}.dat
      tags: [dg_prep]

    # ==========================================
    # FINAL: Summary
    # ==========================================
    - name: "Installation Summary"
      debug:
        msg:
          - "=========================================="
          - "Oracle 21c STANDBY - SOFTWARE INSTALL XONG"
          - "=========================================="
          - "Server IP    : {{ server_ip }}"
          - "Hostname     : {{ hostname_fqdn }}"
          - "DB_UNIQUE    : {{ oracle_unique_name }}"
          - "SID          : {{ oracle_sid }}"
          - "Listener     : {{ listener_port }}"
          - "FRA dir      : {{ fra_dest }}"
          - ""
          - "Chú ý: CHƯA có database — sẽ được tạo bởi RMAN"
          - ""
          - "Bước tiếp theo (trên Primary 192.168.1.195):"
          - "  ansible-playbook setup_primary.yml"
          - "Sau đó trên server này:"
          - "  ansible-playbook setup_standby.yml"
          - "=========================================="
      tags: [always]
