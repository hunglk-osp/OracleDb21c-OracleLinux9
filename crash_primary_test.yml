---
# crash_primary_test.yml
# Simulate Oracle crash bằng kill -9 (không phải shutdown graceful)
# Dùng để test FSFO — observer sẽ trigger failover sau 30s
#
# Chạy: ansible-playbook -i inventory.ini crash_primary_test.yml

- name: "CRASH PRIMARY — Simulate Oracle crash để test FSFO"
  hosts: primary
  become: yes
  tasks:

    - name: "Xác nhận Primary đang chạy"
      become_user: oracle
      shell: |
        export ORACLE_HOME=/u01/app/oracle/product/21c/dbhome_1 ORACLE_SID=ORCL PATH=/u01/app/oracle/product/21c/dbhome_1/bin:$PATH
        echo "SELECT DATABASE_ROLE FROM V\$DATABASE;" | sqlplus -s / as sysdba
      register: check
      failed_when: "'PRIMARY' not in check.stdout"

    - name: "Kill Oracle processes (simulate crash)"
      shell: |
        # Kill tất cả Oracle background processes
        kill -9 $(ps -ef | grep '[o]ra_.*ORCL' | awk '{print $2}') 2>/dev/null || true
        kill -9 $(ps -ef | grep '[t]nslsnr' | awk '{print $2}') 2>/dev/null || true
        echo "KILLED"
      failed_when: false

    - name: "Xác nhận Oracle đã down"
      shell: "ps -ef | grep '[o]ra_.*ORCL' | wc -l"
      register: proc_count

    - debug:
        msg: "Oracle processes còn lại: {{ proc_count.stdout }} — Observer sẽ trigger failover sau ~30s"
