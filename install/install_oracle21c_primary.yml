# install_oracle21c_primary.yml
# Oracle Database 21c on Oracle Linux 9 - PRIMARY SERVER
# Dùng cho server: 192.168.1.195
#
# Fixes so với bản gốc:
# [FIX-1] listener.ora thêm ORCL_DGMGRL entry (bắt buộc cho Data Guard Broker)
# [FIX-2] Sau install set DG_BROKER_CONFIG_FILE đúng path (Oracle 21c read-only home)
# [FIX-3] hostname/IP riêng biệt với standby
# [FIX-4] oradism suid bit preserved
# [FIX-5] systemd service chạy as root để oradism hoạt động đúng
# [FIX-6] Bỏ STEP 3.4 inject libnnzst.a / libjavavm.a — Oracle 21c không dùng static .a nữa
---
- name: Install Oracle Database 21c on Oracle Linux 9 - PRIMARY
  hosts: primary
  become: yes
  vars:
    oracle_base: /u01/app/oracle
    oracle_home: /u01/app/oracle/product/21c/dbhome_1
    oracle_inventory: /u01/app/oraInventory
    oracle_sid: ORCL
    oracle_unique_name: ORCL                          # DB_UNIQUE_NAME của primary
    db_global_name: ORCL
    pdb_name: ORCLPDB1
    sys_password: "Oracle_4U"
    system_password: "Oracle_4U"
    pdb_admin_password: "Oracle_4U"
    db_username: osp
    db_user_password: "Osp@123"
    hostname_fqdn: primarydb.local                   # [FIX-3] Khác với standby
    hostname_short: primarydb
    listener_port: 1521
    total_memory: 2048
    zip_file_remote: "/root/OracleDb21c-OracleLinux9/LINUX.X64_213000_db_home.zip"
    cv_assume_distid: "OEL8.4"

  tasks:
    # ==========================================
    # STEP 0: Prerequisites
    # ==========================================
    - name: "STEP 0: Check prerequisites"
      block:
        - name: Check Oracle Linux
          stat:
            path: /etc/oracle-release
          register: oracle_release
          failed_when: not oracle_release.stat.exists

        - name: Get OL version
          shell: cat /etc/oracle-release | grep -oP 'release \K[0-9]+' | head -1
          register: ol_version
          changed_when: false

        - name: Verify OL9
          assert:
            that: ol_version.stdout == "9"
            fail_msg: "Requires Oracle Linux 9"

        - name: Display resources
          debug:
            msg:
              - "RAM: {{ ansible_memtotal_mb }}MB"
              - "Swap: {{ ansible_swaptotal_mb }}MB"
              - "CPU: {{ ansible_processor_vcpus }}"

        - name: Warn low RAM
          debug:
            msg: "WARNING: RAM < 8GB"
          when: ansible_memtotal_mb < 8192
      tags: [prerequisites, always]

    # ==========================================
    # STEP 1: OS Preparation
    # ==========================================
    - name: "STEP 1.1: Update OS"
      dnf:
        name: "*"
        state: latest
        update_cache: yes
      tags: [os_prep]

    - name: "STEP 1.2: Download compat-openssl10"
      get_url:
        url: https://yum.oracle.com/repo/OracleLinux/OL8/appstream/x86_64/getPackage/compat-openssl10-1.0.2o-4.el8_6.x86_64.rpm
        dest: /tmp/compat-openssl10.rpm
      tags: [os_prep]

    - name: "STEP 1.2: Download oracle-preinstall-21c"
      get_url:
        url: https://yum.oracle.com/repo/OracleLinux/OL8/appstream/x86_64/getPackage/oracle-database-preinstall-21c-1.0-1.el8.x86_64.rpm
        dest: /tmp/oracle-preinstall-21c.rpm
      tags: [os_prep]

    - name: "STEP 1.2: Install compat-openssl10"
      dnf:
        name: /tmp/compat-openssl10.rpm
        state: present
        disable_gpg_check: yes
      environment:
        CV_ASSUME_DISTID: "{{ cv_assume_distid }}"
      tags: [os_prep]

    - name: "STEP 1.2: Install oracle-preinstall-21c"
      dnf:
        name: /tmp/oracle-preinstall-21c.rpm
        state: present
        disable_gpg_check: yes
      environment:
        CV_ASSUME_DISTID: "{{ cv_assume_distid }}"
      tags: [os_prep]

    - name: "STEP 1.2.1: Ensure groups"
      group:
        name: "{{ item.name }}"
        gid: "{{ item.gid }}"
        state: present
      loop:
        - { name: oinstall, gid: 54321 }
        - { name: dba,      gid: 54322 }
        - { name: oper,     gid: 54323 }
        - { name: backupdba,gid: 54324 }
        - { name: dgdba,    gid: 54325 }
        - { name: kmdba,    gid: 54326 }
        - { name: racdba,   gid: 54327 }
      tags: [os_prep]

    - name: "STEP 1.2.1: Ensure oracle user"
      user:
        name: oracle
        uid: 54321
        group: oinstall
        groups: dba,oper,backupdba,dgdba,kmdba,racdba
        home: /home/oracle
        shell: /bin/bash
        create_home: yes
      tags: [os_prep]

    - name: "STEP 1.2.1: Set oracle password"
      user:
        name: oracle
        password: "{{ 'Oracle123' | password_hash('sha512') }}"
      tags: [os_prep]

    - name: "STEP 1.2.2: Configure oracle .bash_profile"
      blockinfile:
        path: /home/oracle/.bash_profile
        marker: "# {mark} ANSIBLE MANAGED - Oracle"
        block: |
          export ORACLE_BASE={{ oracle_base }}
          export ORACLE_HOME={{ oracle_home }}
          export ORACLE_SID={{ oracle_sid }}
          export PATH=$ORACLE_HOME/bin:$PATH
          export LD_LIBRARY_PATH=$ORACLE_HOME/lib:/lib:/usr/lib
          export NLS_LANG=AMERICAN_AMERICA.AL32UTF8
          export CV_ASSUME_DISTID={{ cv_assume_distid }}
        create: yes
        owner: oracle
        group: oinstall
      tags: [os_prep]

    - name: "STEP 1.3: Install additional packages"
      dnf:
        name:
          - gcc
          - gcc-c++
          - glibc-devel
          - ksh
          - libaio-devel
          - libstdc++-devel
          - make
          - nfs-utils
          - sysstat
          - unzip
          - wget
          - vim
        state: present
      tags: [os_prep]

    - name: "STEP 1.4: Create directories"
      file:
        path: "{{ item }}"
        state: directory
        owner: oracle
        group: oinstall
        mode: '0755'
      loop:
        - "{{ oracle_home }}"
        - "{{ oracle_inventory }}"
      tags: [os_prep]

    - name: "STEP 1.5: Configure root .bash_profile"
      blockinfile:
        path: /root/.bash_profile
        marker: "# {mark} ANSIBLE MANAGED - Oracle"
        block: |
          export ORACLE_BASE={{ oracle_base }}
          export ORACLE_HOME={{ oracle_home }}
          export ORACLE_SID={{ oracle_sid }}
          export PATH=$ORACLE_HOME/bin:$PATH
          export LD_LIBRARY_PATH=$ORACLE_HOME/lib:/lib:/usr/lib
          export NLS_LANG=AMERICAN_AMERICA.AL32UTF8
          export CV_ASSUME_DISTID={{ cv_assume_distid }}
        create: yes
      tags: [os_prep]

    - name: "STEP 1.6: Set hostname"
      hostname:
        name: "{{ hostname_fqdn }}"
      tags: [os_prep]

    - name: "STEP 1.6: Get server IP"
      set_fact:
        server_ip: "{{ ansible_default_ipv4.address }}"
      tags: [os_prep, always]

    - name: "STEP 1.6: Update /etc/hosts (self)"
      lineinfile:
        path: /etc/hosts
        regexp: ".*{{ hostname_short }}.*"
        line: "{{ server_ip }}  {{ hostname_fqdn }}  {{ hostname_short }}"
      tags: [os_prep]

    - name: "STEP 1.6: Update /etc/hosts (standby cross-entry)"
      lineinfile:
        path: /etc/hosts
        regexp: ".*standbydb.*"
        line: "192.168.1.196  standbydb.local  standbydb"
      tags: [os_prep]

    # ==========================================
    # STEP 2: Extract Software
    # ==========================================
    - name: "STEP 2.1: Verify ZIP on remote"
      stat:
        path: "{{ zip_file_remote }}"
      register: zip_remote
      failed_when: not zip_remote.stat.exists
      tags: [software]

    - name: "STEP 2.3: Check extracted"
      stat:
        path: "{{ oracle_home }}/runInstaller"
      register: runinstaller
      tags: [software]

    - name: "STEP 2.3: Extract ZIP"
      unarchive:
        src: "{{ zip_file_remote }}"
        dest: "{{ oracle_home }}"
        remote_src: yes
      when: not runinstaller.stat.exists
      tags: [software]

    - name: "STEP 2.3: Set ownership"
      file:
        path: "{{ oracle_home }}"
        owner: oracle
        group: oinstall
        recurse: yes
      tags: [software]

    - name: "STEP 2.3: Set runInstaller perms"
      file:
        path: "{{ oracle_home }}/runInstaller"
        mode: '0755'
      tags: [software]

    # ==========================================
    # STEP 3: Fix OL9 Compatibility
    # ==========================================
    - name: "STEP 3.1: Install compat libraries"
      dnf:
        name:
          - libaio
          - libaio-devel
          - libstdc++
          - libstdc++-devel
          - gcc
          - gcc-c++
          - make
          - glibc-devel
          - compat-openssl10
          - libnsl2
        state: present
      tags: [compatibility]

    - name: "STEP 3.2: Check libpthread"
      stat:
        path: /usr/lib64/libpthread_nonshared.a
      register: libpthread
      tags: [compatibility]

    - name: "STEP 3.2: Create dummy libpthread"
      shell: ar rc /usr/lib64/libpthread_nonshared.a
      when: not libpthread.stat.exists or libpthread.stat.size == 8
      tags: [compatibility]

    - name: "STEP 3.3: Fix LDFLAGS"
      lineinfile:
        path: "{{ oracle_home }}/rdbms/lib/env_rdbms.mk"
        regexp: '^LDFLAGS='
        line: 'LDFLAGS= -lnsl '
        backrefs: yes
      tags: [compatibility]

    - name: "STEP 3.4: Create stat_wrap.c"
      copy:
        dest: /tmp/stat_wrap.c
        content: |
          #define _GNU_SOURCE
          #include <sys/stat.h>
          #include <sys/types.h>
          #include <unistd.h>
          #include <fcntl.h>
          int stat(const char *path, struct stat *buf) {
              return syscall(4, path, buf);
          }
          int fstat(int fd, struct stat *buf) {
              return syscall(5, fd, buf);
          }
      tags: [compatibility]

    - name: "STEP 3.4: Compile stat_wrap"
      shell: gcc -c /tmp/stat_wrap.c -o /tmp/stat_wrap.o
      args:
        creates: /tmp/stat_wrap.o
      tags: [compatibility]

    - name: "STEP 3.4: Check injection libnnzst"
      stat:
        path: "{{ oracle_home }}/lib/.stat_wrap_nnzst"
      register: stat_nnzst
      tags: [compatibility]

    - name: "STEP 3.4: Inject libnnzst"
      shell: ar r {{ oracle_home }}/lib/libnnzst.a /tmp/stat_wrap.o
      when: not stat_nnzst.stat.exists
      tags: [compatibility]

    - name: "STEP 3.4: Mark libnnzst"
      file:
        path: "{{ oracle_home }}/lib/.stat_wrap_nnzst"
        state: touch
      when: not stat_nnzst.stat.exists
      tags: [compatibility]

    - name: "STEP 3.4: Check injection libjavavm"
      stat:
        path: "{{ oracle_home }}/lib/.stat_wrap_javavm"
      register: stat_javavm
      tags: [compatibility]

    - name: "STEP 3.4: Inject libjavavm"
      shell: ar r {{ oracle_home }}/lib/libjavavm.a /tmp/stat_wrap.o
      when: not stat_javavm.stat.exists
      tags: [compatibility]

    - name: "STEP 3.4: Mark libjavavm"
      file:
        path: "{{ oracle_home }}/lib/.stat_wrap_javavm"
        state: touch
      when: not stat_javavm.stat.exists
      tags: [compatibility]

    # ==========================================
    # STEP 4: Install Oracle Software
    # ==========================================
    - name: "STEP 4.1: Create response file"
      copy:
        dest: /tmp/db_install.rsp
        content: |
          oracle.install.responseFileVersion=/oracle/install/rspfmt_dbinstall_response_schema_v21.0.0
          oracle.install.option=INSTALL_DB_SWONLY
          UNIX_GROUP_NAME=oinstall
          INVENTORY_LOCATION={{ oracle_inventory }}
          ORACLE_HOME={{ oracle_home }}
          ORACLE_BASE={{ oracle_base }}
          oracle.install.db.InstallEdition=EE
          oracle.install.db.OSDBA_GROUP=dba
          oracle.install.db.OSOPER_GROUP=oper
          oracle.install.db.OSBACKUPDBA_GROUP=dba
          oracle.install.db.OSDGDBA_GROUP=dba
          oracle.install.db.OSKMDBA_GROUP=dba
          oracle.install.db.OSRACDBA_GROUP=dba
          oracle.install.db.rootconfig.executeRootScript=false
      tags: [install]

    - name: "STEP 4.1.5: Ensure ownership"
      file:
        path: "{{ item }}"
        owner: oracle
        group: oinstall
        mode: '0755'
        recurse: yes
        state: directory
      loop:
        - /u01
        - "{{ oracle_base }}"
        - "{{ oracle_home }}"
        - "{{ oracle_inventory }}"
      tags: [install]

    - name: "STEP 4.2: Check installed"
      stat:
        path: "{{ oracle_inventory }}/ContentsXML/inventory.xml"
      register: inventory_xml
      tags: [install]

    - name: "STEP 4.2: Run runInstaller (10-20 min)"
      become_user: oracle
      shell: |
        export CV_ASSUME_DISTID={{ cv_assume_distid }}
        export ORACLE_BASE={{ oracle_base }}
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/runInstaller -silent \
          -responseFile /tmp/db_install.rsp \
          -ignorePrereqFailure \
          -waitforcompletion
      register: runinstaller_out
      when: not inventory_xml.stat.exists
      failed_when:
        - runinstaller_out.rc != 0
        - "'Successfully Setup Software' not in runinstaller_out.stdout"
      async: 3600
      poll: 30
      tags: [install]

    - name: "STEP 4.3: Check orainstRoot"
      stat:
        path: "{{ oracle_inventory }}/orainstRoot.sh"
      register: orainstroot
      tags: [install]

    - name: "STEP 4.3: Run orainstRoot"
      shell: "{{ oracle_inventory }}/orainstRoot.sh"
      when: orainstroot.stat.exists
      tags: [install]

    - name: "STEP 4.3: Check root.sh"
      stat:
        path: "{{ oracle_home }}/root.sh"
      register: rootsh
      tags: [install]

    - name: "STEP 4.3: Run root.sh"
      shell: "{{ oracle_home }}/root.sh"
      when: rootsh.stat.exists
      tags: [install]

    # [FIX-4] oradism suid bit - phải set sau root.sh, không để recurse chown xóa mất
    - name: "STEP 4.4: Fix oradism suid permission"
      file:
        path: "{{ oracle_home }}/bin/oradism"
        owner: root
        group: oinstall
        mode: '4750'
      tags: [install, autostart]

    # ==========================================
    # STEP 5: Listener & Database
    # ==========================================
    - name: "STEP 5.1: Check listener"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        lsnrctl status
      register: listener_status
      failed_when: false
      changed_when: false
      tags: [listener]

    - name: "STEP 5.1: Create listener via netca"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        netca -silent -responseFile $ORACLE_HOME/assistants/netca/netca.rsp
      when: "'TNS-12541' in listener_status.stderr or 'TNS-01106' in listener_status.stderr"
      tags: [listener]

    # [FIX-1] listener.ora PRIMARY: thêm ORCL_DGMGRL entry
    # Broker dùng SERVICE_NAME=<sid>_DGMGRL để kết nối static khi DB chưa open
    - name: "STEP 5.3: Create listener.ora (PRIMARY)"
      copy:
        dest: "{{ oracle_home }}/network/admin/listener.ora"
        content: |
          LISTENER =
            (DESCRIPTION_LIST =
              (DESCRIPTION =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ server_ip }})(PORT = {{ listener_port }}))
                (ADDRESS = (PROTOCOL = IPC)(KEY = EXTPROC1521))
              )
            )
          SID_LIST_LISTENER =
            (SID_LIST =
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_sid }})
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_sid }}_DGMGRL)
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
            )
        owner: oracle
        group: oinstall
      tags: [listener]

    - name: "STEP 5.3: Restart listener"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        lsnrctl stop || true
        sleep 2
        lsnrctl start
      tags: [listener]

    - name: "STEP 5.4: Check DB datafile exists"
      stat:
        path: "{{ oracle_base }}/oradata/{{ oracle_sid }}/system01.dbf"
      register: db_datafile
      tags: [database]

    - name: "STEP 5.4: Debug DB check result"
      debug:
        msg:
          - "system01.dbf exists: {{ db_datafile.stat.exists }}"
          - "{{ 'DB already created - skipping DBCA' if db_datafile.stat.exists else 'DB not found - will run DBCA' }}"
      tags: [database]

    - name: "STEP 5.4: Create DB via DBCA (15-30 min)"
      become_user: oracle
      shell: |
        export CV_ASSUME_DISTID={{ cv_assume_distid }}
        export ORACLE_BASE={{ oracle_base }}
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/dbca -silent -createDatabase \
          -templateName General_Purpose.dbc \
          -gdbname {{ db_global_name }} \
          -sid {{ oracle_sid }} \
          -createAsContainerDatabase true \
          -numberOfPDBs 1 \
          -pdbName {{ pdb_name }} \
          -pdbAdminPassword {{ pdb_admin_password }} \
          -databaseType MULTIPURPOSE \
          -totalMemory {{ total_memory }} \
          -storageType FS \
          -datafileDestination {{ oracle_base }}/oradata \
          -redoLogFileSize 50 \
          -emConfiguration NONE \
          -characterSet AL32UTF8 \
          -sysPassword {{ sys_password }} \
          -systemPassword {{ system_password }}
      when: not db_datafile.stat.exists
      async: 3600
      poll: 30
      tags: [database]

    - name: "STEP 5.5: Open PDB"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        export PATH=$ORACLE_HOME/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        WHENEVER SQLERROR CONTINUE
        ALTER PLUGGABLE DATABASE {{ pdb_name }} OPEN;
        ALTER PLUGGABLE DATABASE {{ pdb_name }} SAVE STATE;
        EXIT;
        EOF
      failed_when: false
      tags: [database]

    # ==========================================
    # STEP 6: Network (tnsnames)
    # ==========================================
    - name: "STEP 6.1: Create tnsnames.ora"
      copy:
        dest: "{{ oracle_home }}/network/admin/tnsnames.ora"
        content: |
          {{ oracle_sid }} =
            (DESCRIPTION =
              (ADDRESS = (PROTOCOL = TCP)(HOST = {{ server_ip }})(PORT = {{ listener_port }}))
              (CONNECT_DATA = (SERVICE_NAME = {{ oracle_sid }})))
          {{ pdb_name }} =
            (DESCRIPTION =
              (ADDRESS = (PROTOCOL = TCP)(HOST = {{ server_ip }})(PORT = {{ listener_port }}))
              (CONNECT_DATA = (SERVICE_NAME = {{ pdb_name }})))
        owner: oracle
        group: oinstall
      tags: [network]

    - name: "STEP 6.2: Open firewall"
      firewalld:
        port: "{{ listener_port }}/tcp"
        permanent: yes
        state: enabled
        immediate: yes
      tags: [network]

    # ==========================================
    # STEP 7: Register Services
    # ==========================================
    - name: "STEP 7.0: Ensure DB is running"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        export PATH=$ORACLE_HOME/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        STARTUP;
        EXIT;
        EOF
      register: startup_result
      failed_when: false
      changed_when: "'ORA-01081' not in startup_result.stdout"
      tags: [database, register]

    - name: "STEP 7.1: Open PDB and register"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        export PATH=$ORACLE_HOME/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER PLUGGABLE DATABASE {{ pdb_name }} OPEN;
        ALTER SYSTEM SET LOCAL_LISTENER='(ADDRESS=(PROTOCOL=TCP)(HOST={{ server_ip }})(PORT={{ listener_port }}))' SCOPE=BOTH;
        ALTER SYSTEM REGISTER;
        EXIT;
        EOF
      tags: [database, register]

    - name: "STEP 7.2: Wait for registration"
      pause:
        seconds: 15
      tags: [database, register]

    - name: "STEP 7.3: Verify service registered"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        lsnrctl status | grep -i {{ pdb_name | lower }}
      register: svc_check
      retries: 3
      delay: 10
      until: svc_check.rc == 0
      failed_when: false
      tags: [database, register]

    - name: "STEP 7.4: Display listener status"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        lsnrctl status
      register: lsnr_status
      tags: [database, register]

    - name: "STEP 7.4: Show services"
      debug:
        msg: "{{ lsnr_status.stdout_lines }}"
      tags: [database, register]

    - name: "STEP 7.5: Create app user"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        export PATH=$ORACLE_HOME/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER SESSION SET CONTAINER = {{ pdb_name }};
        CREATE USER {{ db_username }} IDENTIFIED BY {{ db_user_password }};
        GRANT CONNECT, RESOURCE, DBA TO {{ db_username }};
        ALTER USER {{ db_username }} DEFAULT TABLESPACE users QUOTA UNLIMITED ON users;
        EXIT;
        EOF
      register: create_user
      failed_when:
        - create_user.rc != 0
        - "'ORA-01920' not in create_user.stdout"
      tags: [database, user]

    - name: "STEP 7.6: Test connection"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        echo "SELECT 'OK' FROM dual;" | sqlplus -s {{ db_username }}/{{ db_user_password }}@{{ server_ip }}:{{ listener_port }}/{{ pdb_name | lower }}
      register: test_conn
      retries: 3
      delay: 5
      until: test_conn.rc == 0
      tags: [database, test]

    - name: "STEP 7.7: Display test result"
      debug:
        var: test_conn.stdout_lines
      tags: [database, test]

    # ==========================================
    # STEP 8: Auto-start
    # ==========================================
    - name: "STEP 8.1: Disable SELinux"
      selinux:
        state: permissive
        policy: targeted
      tags: [autostart]

    # [FIX-4] Chỉ set permission thư mục bin, KHÔNG recurse để tránh xóa suid oradism
    - name: "STEP 8.2: Set bin dir permission (no recurse)"
      file:
        path: "{{ oracle_home }}/bin"
        mode: '0755'
      tags: [autostart]

    - name: "STEP 8.2: Re-fix oradism suid"
      file:
        path: "{{ oracle_home }}/bin/oradism"
        owner: root
        group: oinstall
        mode: '4750'
      tags: [autostart]

    - name: "STEP 8.3: Configure oratab"
      lineinfile:
        path: /etc/oratab
        regexp: "^{{ oracle_sid }}:"
        line: "{{ oracle_sid }}:{{ oracle_home }}:Y"
      tags: [autostart]

    - name: "STEP 8.4: Save PDB state"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        export PATH=$ORACLE_HOME/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER PLUGGABLE DATABASE {{ pdb_name }} SAVE STATE;
        EXIT;
        EOF
      tags: [autostart]

    - name: "STEP 8.4b: Fix dbstart/dbshut log permissions"
      file:
        path: "/u01/app/oracle/homes/OraDB21Home1/rdbms/log/{{ item }}"
        owner: oracle
        group: oinstall
        mode: '0644'
        state: touch
      loop:
        - startup.log
        - shutdown.log
      tags: [autostart]

    - name: "STEP 8.4c: Fix oradism ACL to preserve SUID"
      lineinfile:
        path: "{{ oracle_home }}/install/acls/ss_oracle.rdbms.acl"
        regexp: '^\d+\s+bin/oradism'
        line: '4750    bin/oradism'
      tags: [autostart]

    # [FIX-5] Service chạy as root, wrapper script fix oradism SUID trước dbstart
    - name: "STEP 8.5a: Create oracle-start wrapper"
      copy:
        dest: /usr/local/bin/oracle-start.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Fix oradism SUID before startup
          chown root:oinstall {{ oracle_home }}/bin/oradism
          chmod 4750 {{ oracle_home }}/bin/oradism
          # Start listener (static entries giúp Broker/Observer connect khi DB MOUNTED)
          runuser -l oracle -c "{{ oracle_home }}/bin/lsnrctl start" || true
          # Start database — detect role để open đúng cách
          runuser -l oracle -c "export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:\$PATH; sqlplus -s / as sysdba <<'EOSQL'
          STARTUP MOUNT;
          DECLARE
            v_role VARCHAR2(30);
          BEGIN
            SELECT DATABASE_ROLE INTO v_role FROM V\$DATABASE;
            IF v_role = 'PRIMARY' THEN
              EXECUTE IMMEDIATE 'ALTER DATABASE OPEN';
              EXECUTE IMMEDIATE 'ALTER PLUGGABLE DATABASE ALL OPEN';
            ELSE
              -- Standby: open READ ONLY, start MRP
              EXECUTE IMMEDIATE 'ALTER DATABASE OPEN READ ONLY';
              EXECUTE IMMEDIATE 'ALTER PLUGGABLE DATABASE ALL OPEN READ ONLY';
              EXECUTE IMMEDIATE 'ALTER DATABASE RECOVER MANAGED STANDBY DATABASE USING CURRENT LOGFILE DISCONNECT FROM SESSION';
            END IF;
          END;
          /
          EXIT;
          EOSQL"
      tags: [autostart]

    - name: "STEP 8.5b: Create oracle-stop wrapper"
      copy:
        dest: /usr/local/bin/oracle-stop.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Stop database
          runuser -l oracle -c "export ORACLE_SID={{ oracle_sid }}; sqlplus -s / as sysdba <<'EOSQL'
          SHUTDOWN IMMEDIATE;
          EXIT;
          EOSQL"
          # Stop listener
          runuser -l oracle -c "lsnrctl stop" || true
      tags: [autostart]

    - name: "STEP 8.5c: Create systemd service"
      copy:
        dest: /etc/systemd/system/oracle-db.service
        content: |
          [Unit]
          Description=Oracle Database 21c
          After=network.target

          [Service]
          Type=forking
          ExecStart=/usr/local/bin/oracle-start.sh
          ExecStop=/usr/local/bin/oracle-stop.sh
          RemainAfterExit=yes
          LimitMEMLOCK=infinity
          TimeoutStartSec=600
          TimeoutStopSec=600

          [Install]
          WantedBy=multi-user.target
      tags: [autostart]

    - name: "STEP 8.6: Enable service"
      systemd:
        name: oracle-db
        enabled: yes
        state: started
        daemon_reload: yes
      tags: [autostart]

    # ==========================================
    # [FIX-2] Set DG_BROKER_CONFIG_FILE đúng path
    # Oracle 21c dùng read-only ORACLE_HOME, broker config file nằm ở
    # $ORACLE_BASE/homes/<home_name>/dbs/ KHÔNG phải $ORACLE_HOME/dbs/
    # Phải set đúng path trước khi setup_primary.yml bật DG_BROKER_START
    # ==========================================
    - name: "STEP 9: Detect actual dbs path cho broker config"
      shell: |
        find {{ oracle_base }}/homes -name "dr1{{ oracle_sid }}.dat" 2>/dev/null | head -1 | xargs dirname || \
        echo "{{ oracle_home }}/dbs"
      register: broker_dbs_path
      changed_when: false
      tags: [dg_prep]

    - name: "STEP 9: Show detected broker dbs path"
      debug:
        msg: "Broker config path: {{ broker_dbs_path.stdout }}"
      tags: [dg_prep]

    - name: "STEP 9: Set DG_BROKER_CONFIG_FILE trong SPFILE"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        # Detect đúng path: ưu tiên homes path (Oracle 21c read-only home), fallback về ORACLE_HOME/dbs
        HOMES_PATH=$(find {{ oracle_base }}/homes -maxdepth 3 -name "dbs" -type d 2>/dev/null | head -1)
        DBS_PATH=${HOMES_PATH:-{{ oracle_home }}/dbs}
        sqlplus -s / as sysdba << EOF
        ALTER SYSTEM SET DG_BROKER_CONFIG_FILE1='${DBS_PATH}/dr1{{ oracle_sid }}.dat' SCOPE=SPFILE;
        ALTER SYSTEM SET DG_BROKER_CONFIG_FILE2='${DBS_PATH}/dr2{{ oracle_sid }}.dat' SCOPE=SPFILE;
        EOF
      tags: [dg_prep]

    - name: "STEP 9: Set DB_UNIQUE_NAME cho Primary"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER SYSTEM SET DB_UNIQUE_NAME='{{ oracle_unique_name }}' SCOPE=SPFILE;
        EOF
      tags: [dg_prep]

    # ==========================================
    # FINAL: Summary
    # ==========================================
    - name: "Installation Summary"
      debug:
        msg:
          - "=========================================="
          - "Oracle Database 21c PRIMARY - INSTALL XONG"
          - "=========================================="
          - "Server IP : {{ server_ip }}"
          - "Hostname  : {{ hostname_fqdn }}"
          - "CDB SID   : {{ oracle_sid }}"
          - "DB_UNIQUE : {{ oracle_unique_name }}"
          - "PDB       : {{ pdb_name | lower }}"
          - "User      : {{ db_username }} / {{ db_user_password }}"
          - "SYS       : {{ sys_password }}"
          - ""
          - "Bước tiếp theo:"
          - "  1. Chạy setup_primary.yml trên server này"
          - "  2. Chạy install_oracle21c_standby.yml trên 192.168.1.196"
          - "  3. Chạy setup_standby.yml trên 192.168.1.196"
          - "  4. Chạy setup_primary.yml --tags broker trên server này"
          - "=========================================="
      tags: [always]
