# setup_primary.yml
# Cấu hình Data Guard - PRIMARY (192.168.1.195)
#
# Workflow:
#   Bước 1: ansible-playbook setup_primary.yml          ← chạy trên 195
#   Bước 2: ansible-playbook setup_standby.yml           ← chạy trên 196
#   Bước 3: ansible-playbook setup_primary.yml --tags broker  ← chạy trên 195
#
# Fixes so với bản gốc:
# [FIX-1] listener.ora thêm ORCL_DGMGRL static entry cho Broker
# [FIX-2] DG_BROKER_CONFIG_FILE set đúng path Oracle 21c read-only home
#         trước khi DG_BROKER_START=TRUE
# [FIX-3] Password file copy từ đúng path (tự detect)
# [FIX-4] broker_check condition bắt thêm ORA-16525 (broker chưa start kịp)
# [FIX-5] SHOW CONFIGURATION chạy sau khi broker ổn định hơn (wait 30s)
---
- name: Setup Oracle Data Guard - Primary
  hosts: primary
  become: yes
  vars:
    oracle_home: /u01/app/oracle/product/21c/dbhome_1
    oracle_base: /u01/app/oracle
    oracle_sid: ORCL
    oracle_unique_name: ORCL
    standby_unique_name: ORCL_STBY
    primary_ip: 192.168.1.195
    standby_ip: 192.168.1.196
    listener_port: 1521
    fra_dest: /u01/app/oracle/fast_recovery_area
    fra_size: 20G
    sys_password: "Oracle_4U"
    srl_size_mb: 50   # phải khớp với size online redo log (MB)
    # Mật khẩu root của standby server — dùng để copy SSH key lần đầu
    # Sau khi key đã copy, có thể để trống hoặc xóa
    # Truyền qua: -e "standby_root_password=<pass>" hoặc sửa trực tiếp ở đây
    standby_root_password: ""     # <-- SỬA THÀNH MẬT KHẨU ROOT CỦA STANDBY

  tasks:

    # ==========================================
    # SSH KEY SETUP (Primary → Standby, không hỏi password)
    # Yêu cầu: sshpass đã được cài, hoặc SSH key đã được copy trước
    # ==========================================
    - name: "SSH: Install sshpass"
      dnf:
        name: sshpass
        state: present
      failed_when: false
      tags: [always]

    - name: "SSH: Ensure .ssh directory on Primary"
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'
      tags: [always]

    - name: "SSH: Generate SSH key on Primary (nếu chưa có)"
      shell: ssh-keygen -t rsa -b 4096 -N "" -f /root/.ssh/id_rsa
      args:
        creates: /root/.ssh/id_rsa
      tags: [always]

    - name: "SSH: Copy SSH key sang Standby bằng sshpass"
      shell: |
        sshpass -p "{{ standby_root_password }}" \
          ssh-copy-id -o StrictHostKeyChecking=no root@{{ standby_ip }}
        touch /root/.ssh/.ssh_copy_done_{{ standby_ip }}
      args:
        creates: /root/.ssh/.ssh_copy_done_{{ standby_ip }}
      when: standby_root_password is defined and standby_root_password != ""
      tags: [always]

    - name: "SSH: Verify passwordless SSH sang Standby"
      shell: ssh -o StrictHostKeyChecking=no -o BatchMode=yes root@{{ standby_ip }} "echo OK"
      register: ssh_verify
      changed_when: false
      failed_when: ssh_verify.rc != 0
      tags: [always]

    # ==========================================
    # STEP 1: Prepare Primary Database
    # ==========================================
    - name: "STEP1: Check Archivelog Mode"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF
        SELECT LOG_MODE FROM V$DATABASE;
        EOF
      register: log_mode
      changed_when: false
      tags: [prepare]

    - name: "STEP1: Switch to ARCHIVELOG (nếu chưa)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SHUTDOWN IMMEDIATE;
        STARTUP MOUNT;
        ALTER DATABASE ARCHIVELOG;
        ALTER DATABASE OPEN;
        ALTER PLUGGABLE DATABASE ALL OPEN;
        EOF
      when: "'NOARCHIVELOG' in log_mode.stdout"
      tags: [prepare]

    - name: "STEP1: Enable Force Logging và Flashback"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER DATABASE FORCE LOGGING;
        ALTER SYSTEM SWITCH LOGFILE;
        ALTER DATABASE FLASHBACK ON;
        EOF
      failed_when: false
      tags: [prepare]

    # ==========================================
    # STEP 2: Configure Network
    # ==========================================
    - name: "STEP2: Configure tnsnames.ora"
      copy:
        dest: "{{ oracle_home }}/network/admin/tnsnames.ora"
        owner: oracle
        group: oinstall
        content: |
          {{ oracle_unique_name }} =
            (DESCRIPTION =
              (ADDRESS_LIST =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ primary_ip }})(PORT = {{ listener_port }}))
              )
              (CONNECT_DATA = (SID = {{ oracle_sid }})))

          {{ standby_unique_name }} =
            (DESCRIPTION =
              (ADDRESS_LIST =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ standby_ip }})(PORT = {{ listener_port }}))
              )
              (CONNECT_DATA = (SID = {{ oracle_sid }})))
      tags: [network]

    # [FIX-1] Thêm ORCL_DGMGRL vào SID_LIST_LISTENER
    # Broker dùng static entry này khi primary DB chưa fully open
    - name: "STEP2: Configure listener.ora (PRIMARY)"
      copy:
        dest: "{{ oracle_home }}/network/admin/listener.ora"
        owner: oracle
        group: oinstall
        content: |
          LISTENER =
            (DESCRIPTION_LIST =
              (DESCRIPTION =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ primary_ip }})(PORT = {{ listener_port }}))
              )
            )
          SID_LIST_LISTENER =
            (SID_LIST =
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_sid }})
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
              (SID_DESC =
                (GLOBAL_DBNAME = {{ oracle_sid }}_DGMGRL)
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
            )
      register: listener_changed
      tags: [network]

    - name: "STEP2: Reload listener"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} PATH={{ oracle_home }}/bin:$PATH
        lsnrctl reload
      when: listener_changed.changed
      tags: [network]

    # ==========================================
    # [FIX-2] Set DG_BROKER_CONFIG_FILE TRƯỚC khi bật broker
    # Oracle 21c read-only home: broker file nằm ở homes path, không phải ORACLE_HOME/dbs
    # ==========================================
    - name: "STEP3: Detect broker config file path"
      shell: |
        # Tìm file dr1ORCL.dat nếu đã tồn tại (DB đã chạy trước)
        EXISTING=$(find {{ oracle_base }}/homes -name "dr1{{ oracle_sid }}.dat" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
        if [ -n "$EXISTING" ]; then
          echo "$EXISTING"
        else
          # Detect homes/dbs directory
          HOMES_DBS=$(find {{ oracle_base }}/homes -maxdepth 3 -name "dbs" -type d 2>/dev/null | head -1)
          echo "${HOMES_DBS:-{{ oracle_home }}/dbs}"
        fi
      register: broker_dbs_path
      changed_when: false
      tags: [prepare, broker]

    - name: "STEP3: Show broker config path"
      debug:
        msg: "DG Broker config path: {{ broker_dbs_path.stdout }}"
      tags: [prepare, broker]

    - name: "STEP3: Set DG_BROKER_CONFIG_FILE trong SPFILE"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << EOF
        ALTER SYSTEM SET DG_BROKER_CONFIG_FILE1='{{ broker_dbs_path.stdout }}/dr1{{ oracle_sid }}.dat' SCOPE=SPFILE;
        ALTER SYSTEM SET DG_BROKER_CONFIG_FILE2='{{ broker_dbs_path.stdout }}/dr2{{ oracle_sid }}.dat' SCOPE=SPFILE;
        EOF
      tags: [prepare, broker]

    # ==========================================
    # Copy Password File sang Standby
    # [FIX-3] Tự detect đúng path password file
    # ==========================================
    - name: "PWD: Detect password file path"
      shell: |
        # Oracle 21c có thể để pwfile ở homes/dbs hoặc ORACLE_HOME/dbs
        HOMES_PWD=$(find {{ oracle_base }}/homes -name "orapw{{ oracle_sid }}" 2>/dev/null | head -1)
        LEGACY_PWD="{{ oracle_home }}/dbs/orapw{{ oracle_sid }}"
        BASE_PWD="{{ oracle_base }}/dbs/orapw{{ oracle_sid }}"
        if [ -f "$HOMES_PWD" ]; then echo "$HOMES_PWD"
        elif [ -f "$LEGACY_PWD" ]; then echo "$LEGACY_PWD"
        else echo "$BASE_PWD"
        fi
      register: pwdfile_path
      changed_when: false
      tags: [pwdfile]

    - name: "PWD: Show password file path"
      debug:
        msg: "Password file: {{ pwdfile_path.stdout }}"
      tags: [pwdfile]

    - name: "PWD: Copy password file sang Standby"
      shell: |
        scp -o StrictHostKeyChecking=no \
          {{ pwdfile_path.stdout }} \
          root@{{ standby_ip }}:{{ oracle_base }}/dbs/orapw{{ oracle_sid }}
        ssh -o StrictHostKeyChecking=no root@{{ standby_ip }} \
          "chown oracle:oinstall {{ oracle_base }}/dbs/orapw{{ oracle_sid }}"
      tags: [pwdfile]

    # ==========================================
    # STEP 4: Enable Data Guard Broker
    # Chạy SAU khi đã set DG_BROKER_CONFIG_FILE
    # ==========================================
    - name: "STEP4: Restart DB để áp dụng SPFILE changes (broker config path)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SHUTDOWN IMMEDIATE;
        STARTUP;
        ALTER PLUGGABLE DATABASE ALL OPEN;
        EOF
      tags: [prepare, broker]

    - name: "STEP4: Enable DG Broker trên Primary"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        ALTER SYSTEM SET DG_BROKER_START=TRUE SCOPE=BOTH;
        EOF
      tags: [broker]

    - name: "STEP4: Wait for Broker process to start"
      pause:
        seconds: 15
      tags: [broker]

    - name: "STEP4: Check Standby Redo Logs"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF
        SELECT COUNT(*) FROM V$STANDBY_LOG;
        EXIT;
        EOF
      register: srl_count
      changed_when: false
      tags: [prepare, broker]

    - name: "STEP4: Add Standby Redo Logs (nếu chưa đủ 4)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba << 'EOF'
        WHENEVER SQLERROR EXIT SQL.SQLCODE
        DECLARE
          CURSOR c IS SELECT GROUP# FROM V$STANDBY_LOG;
        BEGIN
          FOR r IN c LOOP
            BEGIN
              EXECUTE IMMEDIATE 'ALTER DATABASE DROP STANDBY LOGFILE GROUP ' || r.GROUP#;
            EXCEPTION WHEN OTHERS THEN NULL;
            END;
          END LOOP;
        END;
        /
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 10 ('/u01/app/oracle/oradata/ORCL/srl_redo10.log') SIZE {{ srl_size_mb }}M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 11 ('/u01/app/oracle/oradata/ORCL/srl_redo11.log') SIZE {{ srl_size_mb }}M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 12 ('/u01/app/oracle/oradata/ORCL/srl_redo12.log') SIZE {{ srl_size_mb }}M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 GROUP 13 ('/u01/app/oracle/oradata/ORCL/srl_redo13.log') SIZE {{ srl_size_mb }}M;
        ALTER SYSTEM SET STANDBY_FILE_MANAGEMENT=AUTO SCOPE=BOTH;
        EXIT;
        EOF
      when: srl_count.stdout | trim != '4'
      tags: [prepare, broker]

    # ==========================================
    # STEP 5: Configure DG Broker
    # Chỉ chạy sau khi setup_standby.yml xong (--tags broker)
    # ==========================================

    # [FIX-4] Check cả ORA-16532 (config không tồn tại) và ORA-16525 (broker chưa ready)
    - name: "STEP5: Check Broker config tồn tại chưa"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        SHOW CONFIGURATION;
        EXIT;
        EOF
      register: broker_check
      failed_when: false
      changed_when: false
      tags: [broker]

    - name: "STEP5: Debug broker check"
      debug:
        msg: "{{ broker_check.stdout_lines }}"
      tags: [broker]

    - name: "STEP5: Create Broker Configuration (chỉ khi chưa tồn tại)"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        CREATE CONFIGURATION 'DG_{{ oracle_sid }}' AS
          PRIMARY DATABASE IS '{{ oracle_unique_name }}'
          CONNECT IDENTIFIER IS '{{ oracle_unique_name }}';
        EXIT;
        EOF
      when: broker_check.stdout is defined and 'ORA-16532' in broker_check.stdout
      tags: [broker]

    - name: "STEP5: Check Standby đã ADD chưa"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        SHOW DATABASE '{{ standby_unique_name }}';
        EXIT;
        EOF
      register: stby_check
      failed_when: false
      changed_when: false
      tags: [broker]

    - name: "STEP5: ADD DATABASE + ENABLE CONFIGURATION"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        ADD DATABASE '{{ standby_unique_name }}'
          AS CONNECT IDENTIFIER IS '{{ standby_unique_name }}'
          MAINTAINED AS PHYSICAL;
        ENABLE CONFIGURATION;
        EXIT;
        EOF
      when: >
        stby_check.stdout is defined and (
        'was not found' in stby_check.stdout or
        'ORA-16532' in stby_check.stdout)
      tags: [broker]

    # [FIX-5] Chờ broker ổn định hơn trước khi SHOW
    - name: "STEP5: Wait for Broker to stabilize"
      pause:
        seconds: 30
      tags: [broker]

    - name: "STEP5: SHOW CONFIGURATION"
      become_user: oracle
      shell: |
        export ORACLE_HOME={{ oracle_home }} ORACLE_SID={{ oracle_sid }} PATH={{ oracle_home }}/bin:$PATH
        dgmgrl sys/{{ sys_password }}@{{ oracle_unique_name }} << 'EOF'
        SHOW CONFIGURATION;
        SHOW DATABASE VERBOSE '{{ oracle_unique_name }}';
        SHOW DATABASE VERBOSE '{{ standby_unique_name }}';
        EXIT;
        EOF
      register: dg_status
      changed_when: false
      tags: [broker, validate]

    - name: "STEP5: Show DG Status"
      debug:
        msg: "{{ dg_status.stdout_lines }}"
      tags: [broker, validate]

    - name: "Summary"
      debug:
        msg:
          - "====================================="
          - "PRIMARY SETUP HOÀN TẤT"
          - "====================================="
          - "Primary  : {{ oracle_unique_name }} @ {{ primary_ip }}"
          - "Standby  : {{ standby_unique_name }} @ {{ standby_ip }}"
          - ""
          - "Workflow:"
          - "  1. setup_primary.yml       ← xong"
          - "  2. setup_standby.yml trên {{ standby_ip }}"
          - "  3. setup_primary.yml --tags broker"
          - "====================================="
      tags: [always]
