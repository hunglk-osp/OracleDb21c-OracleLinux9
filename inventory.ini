# inventory.ini
# Oracle Data Guard: 1 Primary + 1 Standby + 1 Observer
#
# Cách dùng (chạy từ thư mục gốc OracleDb21c-OracleLinux9/):
#   Install primary     : ansible-playbook install/install_oracle21c_primary.yml
#   Install standby     : ansible-playbook install/install_oracle21c_standby.yml
#   Setup DG primary    : ansible-playbook setup/setup_primary.yml
#   Setup DG standby    : ansible-playbook setup/setup_standby.yml
#   Finish DG broker    : ansible-playbook setup/setup_primary.yml --tags broker
#   Enable FSFO+Observer: ansible-playbook install/install_observer.yml
#   Restart crashed DB  : ansible-playbook operations/restart_crashed_db.yml
#   Cleanup             : ansible-playbook operations/cleanup_oracle21c.yml
#   Test crash Primary  : ansible-playbook tests/crash_primary_test.yml
#   Test crash Standby  : ansible-playbook tests/crash_standby_test.yml

[primary]
primarydb ansible_host=192.168.1.195 ansible_user=root ansible_ssh_pass=<password>

[standby]
standbydb ansible_host=192.168.1.196 ansible_user=root ansible_ssh_pass=<password>

[observer]
observerdb ansible_host=192.168.1.18 ansible_user=ubuntu ansible_ssh_pass=<password> ansible_become=yes ansible_become_method=sudo ansible_become_password=<password> 

[oracle_servers:children]
primary
standby

[oracle_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
