# inventory.ini
# Oracle Data Guard: 1 Primary + 1 Standby
#
# Cách dùng:
#   Cleanup cả 2 máy   : ansible-playbook -i inventory.ini cleanup_oracle21c.yml
#   Cleanup chỉ primary: ansible-playbook -i inventory.ini cleanup_oracle21c.yml --limit primary
#   Cleanup chỉ standby: ansible-playbook -i inventory.ini cleanup_oracle21c.yml --limit standby
#   Install primary    : ansible-playbook -i inventory.ini install_oracle21c_primary.yml --limit primary
#   Install standby    : ansible-playbook -i inventory.ini install_oracle21c_standby.yml --limit standby
#   Setup DG primary   : ansible-playbook -i inventory.ini setup_primary.yml --limit primary
#   Setup DG standby   : ansible-playbook -i inventory.ini setup_standby.yml --limit standby
#   Finish DG broker   : ansible-playbook -i inventory.ini setup_primary.yml --limit primary --tags broker
#   Enable FSFO        : ansible-playbook -i inventory.ini setup_fsfo.yml
#   Reinstate after FSFO: ansible-playbook -i inventory.ini setup_fsfo.yml --tags reinstate

[primary]
primarydb ansible_host=192.168.1.195 ansible_user=root ansible_connection=local

[standby]
standbydb ansible_host=192.168.1.196 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

[oracle_servers:children]
primary
standby

[oracle_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
